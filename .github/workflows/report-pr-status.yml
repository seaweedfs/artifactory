name: "Report status to seaweed-mono"

# Mirrors each dispatched test workflow's result back onto the seaweed-mono commit
# as a commit status, so it surfaces as a check on the PR (or commit) that triggered
# it. Each test workflow embeds the seaweed-mono SHA in its run-name as "mono:<sha>";
# this workflow (fired by workflow_run) parses it out and posts the status.
#
# Only acts on runs triggered by repository_dispatch (mono-push / mono-merge-request),
# so manual workflow_dispatch runs are ignored. Requires repo secret MONO_TOKEN to
# include "statuses: write" (commit statuses) on seaweedfs/seaweed-mono.
#
# Note: workflow_run always runs the copy of this file on the default branch, so it
# only takes effect once merged to main.
on:
  workflow_run:
    workflows:
      - "go: build binary (seaweed-mono)"
      - "RDMA software (siw) Tests (seaweed-mono)"
      - "End to End (seaweed-mono)"
      - "EC Integration Tests (seaweed-mono)"
      - "EC Repair Plugin Worker (seaweed-mono)"
      - "FUSE Integration Tests (seaweed-mono)"
      - "Kafka Gateway Tests (seaweed-mono)"
      - "Plugin Worker Tests (seaweed-mono)"
      - "PostgreSQL Gateway Tests (seaweed-mono)"
      - "Rust Volume Server Tests (seaweed-mono)"
      - "S3 Go Tests (seaweed-mono)"
      - "Ceph S3 tests (seaweed-mono)"
      - "seaweed-vfs (seaweed-mono)"
      - "Volume Server Integration Tests (seaweed-mono)"
    types:
      # Only mirror the terminal result; skipping 'requested' halves the number
      # of report runs (one status update per workflow, not a pending+final pair).
      - completed

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    # Only mirror runs that came from seaweed-mono (push/PR dispatch), not manual ones.
    if: github.event.workflow_run.event == 'repository_dispatch'
    steps:
      - name: Mirror status onto seaweed-mono commit
        env:
          MONO_TOKEN: ${{ secrets.MONO_TOKEN }}
          WF_NAME: ${{ github.event.workflow_run.name }}
          WF_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WF_URL: ${{ github.event.workflow_run.html_url }}
          DISPLAY_TITLE: ${{ github.event.workflow_run.display_title }}
        run: |
          set -euo pipefail
          SHA=$(printf '%s' "$DISPLAY_TITLE" | grep -oE 'mono:[0-9a-f]{40}' | head -n1 | cut -d: -f2 || true)
          if [ -z "${SHA:-}" ]; then
            echo "No mono SHA in run title: '$DISPLAY_TITLE' — skipping"
            exit 0
          fi
          case "$WF_CONCLUSION" in
            success)            STATE=success; DESC="passed";;
            cancelled|skipped)  STATE=error;   DESC="$WF_CONCLUSION";;
            *)                  STATE=failure; DESC="${WF_CONCLUSION:-failed}";;
          esac
          echo "Reporting $STATE for '$WF_NAME' on seaweed-mono $SHA"
          BODY=$(jq -n \
            --arg state "$STATE" \
            --arg ctx "artifactory / $WF_NAME" \
            --arg url "$WF_URL" \
            --arg desc "$DESC" \
            '{state:$state, context:$ctx, target_url:$url, description:$desc}')
          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${MONO_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/seaweedfs/seaweed-mono/statuses/${SHA}" \
            -d "$BODY"
