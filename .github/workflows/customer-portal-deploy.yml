name: "Deploy Customer Portal"

on:
  repository_dispatch:
    types:
      - gitlab-push
  workflow_dispatch:
    inputs:
      gitlab_branch:
        description: 'GitLab branch to deploy'
        required: false
        default: 'enterprise'
      setup:
        description: 'Run first-time server setup'
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout artifactory repo
        uses: actions/checkout@v5

      - name: Resolve GitLab branch
        id: resolve_branch
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITLAB_REF: ${{ github.event.client_payload.ref }}
          INPUT_BRANCH: ${{ github.event.inputs.gitlab_branch }}
        run: |
          BRANCH="$GITLAB_REF"
          BRANCH=$(echo "$BRANCH" | sed 's|refs/heads/||')
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "null" ]; then
            BRANCH="$INPUT_BRANCH"
          fi
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "null" ]; then
            BRANCH="enterprise"
          fi

          DEPLOY="true"
          if [ "$EVENT_NAME" = "repository_dispatch" ] && [ "$BRANCH" != "enterprise" ]; then
            echo "Skipping non-enterprise branch: $BRANCH"
            DEPLOY="false"
          fi

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "deploy=$DEPLOY" >> $GITHUB_OUTPUT

      - name: Clone private GitLab repo
        if: steps.resolve_branch.outputs.deploy == 'true'
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          BRANCH="${{ steps.resolve_branch.outputs.branch }}"
          git clone -b "$BRANCH" https://gitlab-ci-token:${GITLAB_TOKEN}@gitlab.com/chrislusf/seaweedfs.git seaweedfs-enterprise-source
          cd seaweedfs-enterprise-source
          echo "COMMIT_SHA=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV

      - name: Detect customer-portal changes
        id: portal_changes
        if: steps.resolve_branch.outputs.deploy == 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.client_payload.before }}
          AFTER: ${{ github.event.client_payload.after }}
        run: |
          if [ "$EVENT_NAME" != "repository_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "null" ] || [ -z "$AFTER" ] || [ "$AFTER" = "null" ]; then
            echo "::warning::GitLab payload missing before/after; proceeding with deploy."
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Checking changes between $BEFORE and $AFTER"
          if git -C seaweedfs-enterprise-source diff --name-only "$BEFORE" "$AFTER" -- > /tmp/changed_files.txt; then
            if grep -q '^customer-portal/' /tmp/changed_files.txt; then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "Customer portal changes detected:"
              grep '^customer-portal/' /tmp/changed_files.txt
            else
              echo "No customer-portal changes detected."
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "::warning::Failed to compute diff; proceeding with deploy."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: First-time Server Setup
        if: steps.resolve_branch.outputs.deploy == 'true' && github.event_name == 'workflow_dispatch' && inputs.setup
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh ~/.ssh/sockets
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host *
            StrictHostKeyChecking no
            ServerAliveInterval 60
            ServerAliveCountMax 10
            ControlMaster auto
            ControlPath ~/.ssh/sockets/%r@%h-%p
            ControlPersist 600
          EOF

          # Create directories and log files
          ssh -i ~/.ssh/deploy_key $REMOTE_USER@$REMOTE_HOST "
            mkdir -p ~/seaweedfs-portal/bin ~/seaweedfs-portal/logs && \
            chmod 755 ~/seaweedfs-portal/logs && \
            touch ~/seaweedfs-portal/logs/portal.log ~/seaweedfs-portal/logs/portal.error.log && \
            chmod 644 ~/seaweedfs-portal/logs/*.log"

          # Create placeholder env file if missing
          if ssh -i ~/.ssh/deploy_key $REMOTE_USER@$REMOTE_HOST "test -f ~/seaweedfs-portal/portal.env"; then
            echo "portal.env already exists; leaving it unchanged."
          else
            cat > portal.env <<'EOF'
          # Update values and keep this file private (chmod 600).
          PORTAL_DB=postgres://portal_user:0o0o030808o@localhost/portal
          PORTAL_SESSION_SECRET=change-me-in-production-32-chars!!
          PORTAL_SMTP_PASSWORD=
          EOF
            scp -i ~/.ssh/deploy_key portal.env $REMOTE_USER@$REMOTE_HOST:~/seaweedfs-portal/portal.env
            rm -f portal.env
            ssh -i ~/.ssh/deploy_key $REMOTE_USER@$REMOTE_HOST "chmod 600 ~/seaweedfs-portal/portal.env"
          fi

          # Create service file
          cat > seaweedfs-portal.service <<EOF
          [Unit]
          Description=SeaweedFS Customer Portal Service
          After=network.target

          [Service]
          Type=simple
          User=$REMOTE_USER
          WorkingDirectory=/home/$REMOTE_USER/seaweedfs-portal
          EnvironmentFile=/home/$REMOTE_USER/seaweedfs-portal/portal.env
          ExecStart=/home/$REMOTE_USER/seaweedfs-portal/bin/customer-portal -port=8090 -baseUrl=https://portal.seaweedfs.com
          Restart=always
          StandardOutput=append:/home/$REMOTE_USER/seaweedfs-portal/logs/portal.log
          StandardError=append:/home/$REMOTE_USER/seaweedfs-portal/logs/portal.error.log

          [Install]
          WantedBy=multi-user.target
          EOF

          # Setup logrotate configuration
          cat > seaweedfs-portal_logrotate <<EOF
          # SeaweedFS Customer Portal log rotation
          /home/$REMOTE_USER/seaweedfs-portal/logs/*.log {
              daily
              rotate 7
              compress
              delaycompress
              missingok
              notifempty
              create 644 $REMOTE_USER $REMOTE_USER
              postrotate
                  systemctl restart seaweedfs-portal.service
              endscript
          }
          EOF

          # Copy and install service and logrotate files
          scp -i ~/.ssh/deploy_key seaweedfs-portal.service seaweedfs-portal_logrotate $REMOTE_USER@$REMOTE_HOST:~/seaweedfs-portal/
          ssh -i ~/.ssh/deploy_key $REMOTE_USER@$REMOTE_HOST "
            sudo mv ~/seaweedfs-portal/seaweedfs-portal.service /etc/systemd/system/ && \
            sudo mv ~/seaweedfs-portal/seaweedfs-portal_logrotate /etc/logrotate.d/seaweedfs-portal && \
            sudo systemctl daemon-reload && \
            sudo systemctl enable seaweedfs-portal.service"

          rm -f ~/.ssh/deploy_key seaweedfs-portal.service seaweedfs-portal_logrotate

      - name: Set up Go
        if: steps.portal_changes.outputs.changed == 'true' && steps.resolve_branch.outputs.deploy == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: 'seaweedfs-enterprise-source/go.mod'
          cache-dependency-path: 'seaweedfs-enterprise-source/go.sum'

      - name: Add GOPATH/bin to PATH
        if: steps.portal_changes.outputs.changed == 'true' && steps.resolve_branch.outputs.deploy == 'true'
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build customer-portal
        if: steps.portal_changes.outputs.changed == 'true' && steps.resolve_branch.outputs.deploy == 'true'
        working-directory: seaweedfs-enterprise-source/customer-portal
        run: |
          make
          test -f customer-portal
          ls -lh customer-portal

      - name: Deploy customer-portal binary
        if: steps.portal_changes.outputs.changed == 'true' && steps.resolve_branch.outputs.deploy == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh ~/.ssh/sockets
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host *
            StrictHostKeyChecking no
            ServerAliveInterval 60
            ServerAliveCountMax 10
            ControlMaster auto
            ControlPath ~/.ssh/sockets/%r@%h-%p
            ControlPersist 600
          EOF

          # Ensure temp directory exists
          ssh -i ~/.ssh/deploy_key $REMOTE_USER@$REMOTE_HOST "mkdir -p ~/seaweedfs-portal/tmp"
          scp -i ~/.ssh/deploy_key seaweedfs-enterprise-source/customer-portal/customer-portal $REMOTE_USER@$REMOTE_HOST:~/seaweedfs-portal/tmp/customer-portal
          
          # Stop service, replace binary securely, and restart
          ssh -i ~/.ssh/deploy_key $REMOTE_USER@$REMOTE_HOST "
            sudo systemctl stop seaweedfs-portal.service && \
            chmod +x ~/seaweedfs-portal/tmp/customer-portal && \
            mkdir -p ~/seaweedfs-portal/bin && \
            mv ~/seaweedfs-portal/tmp/customer-portal ~/seaweedfs-portal/bin/customer-portal && \
            sudo systemctl start seaweedfs-portal.service"

          rm -f ~/.ssh/deploy_key
