name: "Volume Server Integration Tests (seaweed-mono)"

on:
  # Triggered by seaweed-mono push (repository_dispatch)
  repository_dispatch:
    types:
      - mono-push
      - mono-merge-request

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      gitlab_branch:
        description: 'seaweed-mono branch to test'
        required: false
        default: 'main'

concurrency:
  group: ${{ github.head_ref || github.run_id }}/volume-server-integration
  cancel-in-progress: true

permissions:
  contents: read

env:
  TEST_TIMEOUT: '30m'

jobs:
  go-volume-server-integration-tests:
    name: Go Volume Server Integration (${{ matrix.test-type }} - Shard ${{ matrix.shard }})
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        test-type: [grpc, http]
        shard: [1, 2, 3]

    steps:
    - name: Checkout artifactory repo
      uses: actions/checkout@v6

    - name: Clone seaweed-mono (enterprise) source
      env:
        MONO_TOKEN: ${{ secrets.MONO_TOKEN }}
        EVENT_NAME: ${{ github.event_name }}
        PAYLOAD_REF: ${{ github.event.client_payload.ref }}
        INPUT_BRANCH: ${{ github.event.inputs.gitlab_branch }}
      run: |
        if [ "$EVENT_NAME" = "repository_dispatch" ]; then BRANCH="$PAYLOAD_REF"; else BRANCH="$INPUT_BRANCH"; fi
        [ -n "$BRANCH" ] && [ "$BRANCH" != "null" ] || BRANCH="main"
        BRANCH=$(echo "$BRANCH" | sed 's|refs/heads/||')
        if [ "$BRANCH" = "null" ]; then
          BRANCH="main"
        fi
        if ! printf '%s' "$BRANCH" | grep -Eq '^[A-Za-z0-9._/-]+$'; then echo "Refusing invalid branch: $BRANCH" >&2; exit 1; fi
        echo "Cloning branch: $BRANCH"
        git clone -b "$BRANCH" https://x-access-token:${MONO_TOKEN}@github.com/seaweedfs/seaweed-mono.git seaweedfs-source
        cd seaweedfs-source
        echo "Cloned commit: $(git rev-parse HEAD)"
        echo "COMMIT_SHA=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV
        echo "BRANCH_NAME=$BRANCH" >> $GITHUB_ENV

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'seaweedfs-source/enterprise/go.mod'
        cache-dependency-path: 'seaweedfs-source/enterprise/go.sum'

    - name: Build SeaweedFS binary
      working-directory: seaweedfs-source/enterprise/weed
      run: |
        go build -o weed .
        chmod +x weed
        ./weed version

    - name: Run volume server integration tests
      working-directory: seaweedfs-source/enterprise
      env:
        WEED_BINARY: ${{ github.workspace }}/seaweedfs-source/enterprise/weed/weed
      run: |
        if [ "${{ matrix.test-type }}" == "grpc" ]; then
          if [ "${{ matrix.shard }}" == "1" ]; then
            TEST_PATTERN="^Test[A-H]"
          elif [ "${{ matrix.shard }}" == "2" ]; then
            TEST_PATTERN="^Test[I-S]"
          else
            TEST_PATTERN="^Test[T-Z]"
          fi
        else
          if [ "${{ matrix.shard }}" == "1" ]; then
            TEST_PATTERN="^Test[A-G]"
          elif [ "${{ matrix.shard }}" == "2" ]; then
            TEST_PATTERN="^Test[H-R]"
          else
            TEST_PATTERN="^Test[S-Z]"
          fi
        fi
        echo "Running volume server integration tests for ${{ matrix.test-type }} (Shard ${{ matrix.shard }}, pattern: ${TEST_PATTERN})..."
        go test -v -count=1 -timeout=${{ env.TEST_TIMEOUT }} ./test/volume_server/${{ matrix.test-type }}/... -run "${TEST_PATTERN}"

    - name: Collect logs on failure
      if: failure()
      run: |
        mkdir -p /tmp/volume-server-it-logs
        find /tmp -maxdepth 1 -type d -name "seaweedfs_volume_server_it_*" -print -exec cp -r {} /tmp/volume-server-it-logs/ \; || true

    - name: Archive logs on failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: go-volume-server-integration-test-logs-${{ matrix.test-type }}-shard${{ matrix.shard }}-${{ env.COMMIT_SHA }}
        path: /tmp/volume-server-it-logs/
        if-no-files-found: warn
        retention-days: 7

    - name: Test summary
      if: always()
      run: |
        if [ "${{ matrix.test-type }}" == "grpc" ]; then
          if [ "${{ matrix.shard }}" == "1" ]; then
            TEST_PATTERN="^Test[A-H]"
          elif [ "${{ matrix.shard }}" == "2" ]; then
            TEST_PATTERN="^Test[I-S]"
          else
            TEST_PATTERN="^Test[T-Z]"
          fi
        else
          if [ "${{ matrix.shard }}" == "1" ]; then
            TEST_PATTERN="^Test[A-G]"
          elif [ "${{ matrix.shard }}" == "2" ]; then
            TEST_PATTERN="^Test[H-R]"
          else
            TEST_PATTERN="^Test[S-Z]"
          fi
        fi
        echo "## Go Volume Server Integration Test Summary (${{ matrix.test-type }} - Shard ${{ matrix.shard }})" >> "$GITHUB_STEP_SUMMARY"
        echo "- Source: github.com/seaweedfs/seaweed-mono enterprise/ (branch: ${{ env.BRANCH_NAME }}, commit: ${{ env.COMMIT_SHA }})" >> "$GITHUB_STEP_SUMMARY"
        echo "- Suite: test/volume_server/${{ matrix.test-type }} (Pattern: ${TEST_PATTERN})" >> "$GITHUB_STEP_SUMMARY"
        echo "- Command: go test -v -count=1 -timeout=${{ env.TEST_TIMEOUT }} ./test/volume_server/${{ matrix.test-type }}/... -run \"${TEST_PATTERN}\"" >> "$GITHUB_STEP_SUMMARY"
