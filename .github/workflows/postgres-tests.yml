name: "PostgreSQL Gateway Tests (seaweed-mono)"
run-name: ${{ github.workflow }}${{ github.event.client_payload.sha && format(' · mono:{0}', github.event.client_payload.sha) || '' }}

on:
  # Triggered by seaweed-mono push (repository_dispatch)
  repository_dispatch:
    types:
      - mono-push
      - mono-merge-request

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      gitlab_branch:
        description: 'seaweed-mono branch to test'
        required: false
        default: 'main'

concurrency:
  # head_ref is empty for repository_dispatch/workflow_dispatch, so key on the
  # dispatched mono ref (or the manual branch input) to actually dedupe runs.
  group: ${{ github.event.client_payload.ref || github.event.inputs.gitlab_branch || 'main' }}/postgres-tests
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  postgres-basic-tests:
    name: PostgreSQL Basic Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout artifactory repo
      uses: actions/checkout@v6

    - name: Link to seaweed-mono source
      if: github.event_name == 'repository_dispatch'
      uses: ./.github/actions/mono-source-link

    - name: Clone seaweed-mono (enterprise) source
      uses: ./.github/actions/clone-mono-source
      with:
        token: ${{ secrets.MONO_TOKEN }}
        branch: ${{ github.event.inputs.gitlab_branch }}

    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version-file: 'seaweedfs-source/enterprise/go.mod'
        cache-dependency-path: 'seaweedfs-source/enterprise/go.sum'
      id: go

    - name: Configure Docker Hub mirror
      working-directory: ${{ github.workspace }}
      run: |
        echo '{"registry-mirrors": ["https://mirror.gcr.io"]}' | sudo tee /etc/docker/daemon.json
        sudo systemctl restart docker

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Cache Docker layers
      uses: actions/cache@v5
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-postgres-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-postgres-

    - name: Start PostgreSQL Gateway Services
      working-directory: seaweedfs-source/enterprise/test/postgres
      run: |
        make dev-start
        sleep 10

    - name: Run Basic Connectivity Test
      working-directory: seaweedfs-source/enterprise/test/postgres
      run: |
        make test-basic

    - name: Run PostgreSQL Client Tests
      working-directory: seaweedfs-source/enterprise/test/postgres
      run: |
        make test-client

    - name: Save logs
      if: always()
      working-directory: seaweedfs-source/enterprise/test/postgres
      run: |
        docker compose logs > postgres-output.log || true

    - name: Archive logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: postgres-logs-${{ env.COMMIT_SHA }}
        path: seaweedfs-source/enterprise/test/postgres/postgres-output.log

    - name: PostgreSQL Test Summary
      if: always()
      run: |
        echo "## 🐘 PostgreSQL Gateway Test Summary" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "### Source" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Commit**: ${COMMIT_SHA}" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "### Test Components" >> "$GITHUB_STEP_SUMMARY"
        echo "- 🔌 **Basic Connectivity**: PostgreSQL protocol compatibility" >> "$GITHUB_STEP_SUMMARY"
        echo "- 📊 **Client Tests**: Standard PostgreSQL client operations" >> "$GITHUB_STEP_SUMMARY"
        echo "- 🐳 **Docker Integration**: Containerized test environment" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "### PostgreSQL Gateway Features" >> "$GITHUB_STEP_SUMMARY"
        echo "- ✅ **Protocol Compatibility**: Standard PostgreSQL wire protocol" >> "$GITHUB_STEP_SUMMARY"
        echo "- ✅ **SQL Query Support**: Basic SQL operations over SeaweedFS" >> "$GITHUB_STEP_SUMMARY"
        echo "- ✅ **Client Library Support**: Works with standard PostgreSQL clients" >> "$GITHUB_STEP_SUMMARY"

    - name: Cleanup
      if: always()
      working-directory: seaweedfs-source/enterprise/test/postgres
      run: |
        make clean || true
