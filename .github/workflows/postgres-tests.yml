name: "PostgreSQL Gateway Tests (seaweed-mono)"

on:
  # Triggered by seaweed-mono push (repository_dispatch)
  repository_dispatch:
    types: 
      - mono-push
      - mono-merge-request
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      gitlab_branch:
        description: 'seaweed-mono branch to test'
        required: false
        default: 'main'

concurrency:
  group: ${{ github.head_ref || github.run_id }}/postgres-tests
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  postgres-basic-tests:
    name: PostgreSQL Basic Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout artifactory repo
      uses: actions/checkout@v6

    - name: Clone seaweed-mono (enterprise) source
      env:
        MONO_TOKEN: ${{ secrets.MONO_TOKEN }}
        EVENT_NAME: ${{ github.event_name }}
        PAYLOAD_REF: ${{ github.event.client_payload.ref }}
        INPUT_BRANCH: ${{ github.event.inputs.gitlab_branch }}
      run: |
        # Determine branch from webhook or manual input
        if [ "$EVENT_NAME" = "repository_dispatch" ]; then
          BRANCH="$PAYLOAD_REF"
        else
          BRANCH="$INPUT_BRANCH"
        fi
        [ -n "$BRANCH" ] && [ "$BRANCH" != "null" ] || BRANCH="main"
        BRANCH=$(echo "$BRANCH" | sed 's|refs/heads/||')
        if [ "$BRANCH" = "null" ]; then
          BRANCH="main"
        fi

        if ! printf '%s' "$BRANCH" | grep -Eq '^[A-Za-z0-9._/-]+$'; then
          echo "Refusing invalid branch: $BRANCH" >&2
          exit 1
        fi

        echo "Cloning branch: $BRANCH"
        git clone -b "$BRANCH" https://x-access-token:${MONO_TOKEN}@github.com/seaweedfs/seaweed-mono.git seaweedfs-source
        
        cd seaweedfs-source
        echo "Cloned commit: $(git rev-parse HEAD)"
        echo "COMMIT_SHA=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV

    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version-file: 'seaweedfs-source/enterprise/go.mod'
      id: go

    - name: Configure Docker Hub mirror
      run: |
        echo '{"registry-mirrors": ["https://mirror.gcr.io"]}' | sudo tee /etc/docker/daemon.json
        sudo systemctl restart docker

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Cache Docker layers
      uses: actions/cache@v5
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-postgres-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-postgres-

    - name: Start PostgreSQL Gateway Services
      working-directory: seaweedfs-source/enterprise/test/postgres
      run: |
        make dev-start
        sleep 10

    - name: Run Basic Connectivity Test
      working-directory: seaweedfs-source/enterprise/test/postgres
      run: |
        make test-basic

    - name: Run PostgreSQL Client Tests
      working-directory: seaweedfs-source/enterprise/test/postgres
      run: |
        make test-client

    - name: Save logs
      if: always()
      working-directory: seaweedfs-source/enterprise/test/postgres
      run: |
        docker compose logs > postgres-output.log || true

    - name: Archive logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: postgres-logs-${{ env.COMMIT_SHA }}
        path: seaweedfs-source/enterprise/test/postgres/postgres-output.log

    - name: PostgreSQL Test Summary
      if: always()
      env:
        PAYLOAD_REF: ${{ github.event.client_payload.ref }}
        INPUT_BRANCH: ${{ github.event.inputs.gitlab_branch }}
      run: |
        echo "## 🐘 PostgreSQL Gateway Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### seaweed-mono Source" >> $GITHUB_STEP_SUMMARY
        echo "- **Repository**: https://github.com/seaweedfs/seaweed-mono" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ env.COMMIT_SHA }}" >> $GITHUB_STEP_SUMMARY
        BRANCH="${PAYLOAD_REF:-$INPUT_BRANCH}"; BRANCH="${BRANCH:-main}"; BRANCH="${BRANCH#refs/heads/}"
        echo "- **Branch**: $BRANCH" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Test Components" >> $GITHUB_STEP_SUMMARY
        echo "- 🔌 **Basic Connectivity**: PostgreSQL protocol compatibility" >> $GITHUB_STEP_SUMMARY
        echo "- 📊 **Client Tests**: Standard PostgreSQL client operations" >> $GITHUB_STEP_SUMMARY
        echo "- 🐳 **Docker Integration**: Containerized test environment" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### PostgreSQL Gateway Features" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Protocol Compatibility**: Standard PostgreSQL wire protocol" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **SQL Query Support**: Basic SQL operations over SeaweedFS" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Client Library Support**: Works with standard PostgreSQL clients" >> $GITHUB_STEP_SUMMARY

    - name: Cleanup
      if: always()
      working-directory: seaweedfs-source/enterprise/test/postgres
      run: |
        make clean || true
