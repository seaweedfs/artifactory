name: "Volume Tiering Tests (seaweed-mono)"
run-name: ${{ github.workflow }}${{ github.event.client_payload.sha && format(' · mono:{0}', github.event.client_payload.sha) || '' }}

# End-to-end guard for the storage-class tiering DSL: a real cluster is driven
# through `weed shell` the way an operator drives it, and the assertions read
# back what the cluster reports.
#
# The cluster runs two media (ssd, hdd_ht) with two volume servers each. Both
# parts matter: tiering plans from physically grounded placement, so a single
# medium proves nothing, and a same-node cross-disk move is refused (the delete
# primitive is node-wide) so each tier needs a distinct host to move to.

on:
  # Triggered by seaweed-mono push (repository_dispatch)
  repository_dispatch:
    types:
      - mono-push
      - mono-merge-request

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      gitlab_branch:
        description: 'seaweed-mono branch to test'
        required: false
        default: 'main'

concurrency:
  # head_ref is empty for repository_dispatch/workflow_dispatch, so key on the
  # dispatched mono ref (or the manual branch input) to actually dedupe runs.
  group: ${{ github.event.client_payload.ref || github.event.inputs.gitlab_branch || 'main' }}/volume-tiering
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  volume-tiering-tests:
    name: Volume Tiering E2E
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
    - name: Checkout artifactory repo
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Link to seaweed-mono source
      if: github.event_name == 'repository_dispatch'
      uses: ./.github/actions/mono-source-link

    - name: Clone seaweed-mono (enterprise) source
      uses: ./.github/actions/clone-mono-source
      with:
        token: ${{ secrets.MONO_TOKEN }}
        branch: ${{ github.event.inputs.gitlab_branch }}

    # Branches predating the tiering suite have no such directory; skip rather
    # than fail so the guard only runs where the suite actually exists.
    - name: Check for volume tiering suite
      id: check
      run: |
        if [ -d seaweedfs-source/enterprise/test/volume_tiering ]; then
          echo "present=true" >> "$GITHUB_OUTPUT"
        else
          echo "present=false" >> "$GITHUB_OUTPUT"
          echo "::notice::Branch has no enterprise/test/volume_tiering; skipping volume tiering tests."
        fi

    - name: Set up Go
      if: steps.check.outputs.present == 'true'
      uses: actions/setup-go@v6
      with:
        go-version-file: 'seaweedfs-source/enterprise/go.mod'
        cache-dependency-path: 'seaweedfs-source/enterprise/go.sum'

    # The suite's teardown waits for the cluster's ports to be released before a
    # following start, which it checks with lsof.
    - name: Install lsof
      if: steps.check.outputs.present == 'true'
      run: sudo apt-get update && sudo apt-get install -y lsof

    - name: Run volume tiering E2E suite
      if: steps.check.outputs.present == 'true'
      working-directory: seaweedfs-source/enterprise/test/volume_tiering
      run: |
        echo "Starting a two-medium cluster (ssd x2, hdd_ht x2) and running the tiering suite..."
        echo "  quiet trigger holds a volume that was never written"
        echo "  a replicated volume relocates to the colder medium, payload byte-identical after"
        echo "  an encode is planned onto the EC tier"
        echo "  an unbound collection is never planned (ownership boundary)"
        echo "  a dry run moves nothing"
        make test

    - name: Collect cluster logs on failure
      if: failure()
      run: |
        mkdir -p /tmp/volume-tiering-logs
        find /tmp/volume_tiering_test -name '*.log' -exec cp --parents {} /tmp/volume-tiering-logs/ \; 2>/dev/null || true

    - name: Archive cluster logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: volume-tiering-logs-${{ env.COMMIT_SHA }}
        path: /tmp/volume-tiering-logs/
        if-no-files-found: warn
        retention-days: 7

    - name: Stop the cluster
      if: always() && steps.check.outputs.present == 'true'
      working-directory: seaweedfs-source/enterprise/test/volume_tiering
      run: make stop || true

    - name: Summary
      if: always()
      run: |
        echo "## Volume Tiering E2E" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        if [ "${{ steps.check.outputs.present }}" != "true" ]; then
          echo "Branch has no \`enterprise/test/volume_tiering\`; suite skipped." >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi
        echo "Result: **${{ job.status }}**" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "Suite: \`test/volume_tiering\`, driven through \`weed shell\` against a live cluster." >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "### Cluster" >> "$GITHUB_STEP_SUMMARY"
        echo "- two media, two volume servers each: **ssd** x2, **hdd_ht** x2" >> "$GITHUB_STEP_SUMMARY"
        echo "- two per medium because a same-node cross-disk move is refused, so a tier needs a distinct host to move to" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "### Covered" >> "$GITHUB_STEP_SUMMARY"
        echo "- **quiet trigger** holds a volume that was never written (regression guard: such a volume once read as decades old and was tiered the moment it was created)" >> "$GITHUB_STEP_SUMMARY"
        echo "- **replicated move** to the colder medium, payload byte-identical afterwards" >> "$GITHUB_STEP_SUMMARY"
        echo "- **encode** planned onto the EC tier" >> "$GITHUB_STEP_SUMMARY"
        echo "- **unbound collection** never planned — the boundary that keeps tiering off stock volumes" >> "$GITHUB_STEP_SUMMARY"
        echo "- **dry run** moves nothing" >> "$GITHUB_STEP_SUMMARY"
