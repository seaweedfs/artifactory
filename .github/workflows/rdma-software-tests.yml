name: "RDMA software (siw) Tests (seaweed-mono)"
run-name: ${{ github.workflow }}${{ github.event.client_payload.sha && format(' · mono:{0}', github.event.client_payload.sha) || '' }}

on:
  # Triggered by seaweed-mono push (repository_dispatch)
  repository_dispatch:
    types:
      - mono-push
      - mono-merge-request

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      gitlab_branch:
        description: 'seaweed-mono branch to test'
        required: false
        default: 'main'

concurrency:
  group: ${{ github.head_ref || github.run_id }}/rdma-software-tests
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Fast gate: the enterprise/rust workspace builds and its unit tests pass with
  # RDMA OFF (the default, macOS-buildable path). No software RDMA required.
  rdma-off-build:
    name: RDMA-off build + unit tests
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout artifactory repo
        uses: actions/checkout@v6

      - name: Clone seaweed-mono (enterprise) source
        env:
          MONO_TOKEN: ${{ secrets.MONO_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PAYLOAD_REF: ${{ github.event.client_payload.ref }}
          INPUT_BRANCH: ${{ github.event.inputs.gitlab_branch }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then BRANCH="$PAYLOAD_REF"; else BRANCH="$INPUT_BRANCH"; fi
          [ -n "$BRANCH" ] && [ "$BRANCH" != "null" ] || BRANCH="main"
          BRANCH=$(echo "$BRANCH" | sed 's|refs/heads/||')
          if [ "$BRANCH" = "null" ]; then
            BRANCH="main"
          fi
          if ! printf '%s' "$BRANCH" | grep -Eq '^[A-Za-z0-9._/-]+$'; then echo "Refusing invalid branch: $BRANCH" >&2; exit 1; fi
          echo "Cloning branch: $BRANCH"
          git clone -b "$BRANCH" https://x-access-token:${MONO_TOKEN}@github.com/seaweedfs/seaweed-mono.git seaweedfs-source

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            seaweedfs-source/enterprise/rust/target
          key: rust-rdma-${{ hashFiles('seaweedfs-source/enterprise/rust/Cargo.lock') }}
          restore-keys: |
            rust-rdma-

      # Lib/bin build pulls no dev-deps, so the volume-server `rdma` feature and
      # rdma-sys are never compiled here — this stays a pure RDMA-off check.
      - name: Build enterprise/rust workspace (no RDMA)
        run: cd seaweedfs-source/enterprise/rust && cargo build --workspace

      - name: Unit tests (volume server, no RDMA)
        run: cd seaweedfs-source/enterprise/rust && cargo test -p seaweedfs-volume-server

  # Full-wire RDMA datapath over software RDMA (siw): the read + write e2e tests
  # drive a real volume server + gRPC + one-sided RDMA. Needs the siw kernel
  # module and root for verbs/rdma_cm.
  rdma-software-e2e:
    name: software RDMA e2e (read + staged write)
    runs-on: ubuntu-22.04
    timeout-minutes: 40

    steps:
      - name: Checkout artifactory repo
        uses: actions/checkout@v6

      - name: Clone seaweed-mono (enterprise) source
        env:
          MONO_TOKEN: ${{ secrets.MONO_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PAYLOAD_REF: ${{ github.event.client_payload.ref }}
          INPUT_BRANCH: ${{ github.event.inputs.gitlab_branch }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then BRANCH="$PAYLOAD_REF"; else BRANCH="$INPUT_BRANCH"; fi
          [ -n "$BRANCH" ] && [ "$BRANCH" != "null" ] || BRANCH="main"
          BRANCH=$(echo "$BRANCH" | sed 's|refs/heads/||')
          if [ "$BRANCH" = "null" ]; then
            BRANCH="main"
          fi
          if ! printf '%s' "$BRANCH" | grep -Eq '^[A-Za-z0-9._/-]+$'; then echo "Refusing invalid branch: $BRANCH" >&2; exit 1; fi
          echo "Cloning branch: $BRANCH"
          git clone -b "$BRANCH" https://x-access-token:${MONO_TOKEN}@github.com/seaweedfs/seaweed-mono.git seaweedfs-source

      # Build deps: protoc (tonic-build), clang/libclang (rdma-sys bindgen),
      # ibverbs/rdmacm headers. Runtime: rdma-core (`rdma`), ibverbs-utils
      # (`ibv_devices`) and the userspace siw provider, libsiw (ibverbs-providers).
      - name: Install build + RDMA userspace deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler clang libclang-dev \
            libibverbs-dev librdmacm-dev rdma-core ibverbs-providers ibverbs-utils

      - name: Bring up software RDMA (siw / Soft-iWARP)
        run: |
          set -euxo pipefail
          # GitHub's ubuntu-22.04 runners boot the linux-azure kernel, which ships
          # siw (Soft-iWARP) but NOT rdma_rxe (SoftRoCE) in modules-extra. siw drives
          # the same RC verbs + rdma_cm (RDMA_PS_TCP) path these one-sided read/write
          # e2e tests use, so it is a drop-in software RDMA transport here.
          sudo apt-get install -y "linux-modules-extra-$(uname -r)" || \
            echo "linux-modules-extra not available; relying on in-tree siw"
          sudo modprobe siw || { echo "::error::siw module unavailable on $(uname -r)"; exit 1; }
          # Give siw its own dummy netdev with a private IP. eth0 also carries
          # Azure's hardware RDMA device (mana_0), which hijacks rdma_cm IP->device
          # resolution and fails create_ep with ENODEV; and rdma_cm refuses to bind
          # a device to a loopback (127.0.0.1) address ("no device context"). A
          # private IP on a dummy interface maps only to siw0 and is a real
          # (non-loopback) device context; same-host connects deliver locally.
          sudo modprobe dummy || true
          sudo ip link add swrdma0 type dummy
          sudo ip addr add 10.99.0.1/24 dev swrdma0
          sudo ip link set swrdma0 up
          sudo rdma link add siw0 type siw netdev swrdma0
          rdma link
          ibv_devices
          # Fail loudly (not silently skip) if siw didn't come up on this kernel.
          # `rdma link` names the link "<dev>/<port>" (e.g. siw0/1), so match by device.
          rdma link | grep -q 'siw0' || { echo "::error::software RDMA siw0 unavailable on this runner kernel"; exit 1; }
          # The e2e tests read the target IP from RXE_IP (kept as the test's contract).
          echo "RXE_IP=10.99.0.1" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            seaweedfs-source/enterprise/rust/target
          key: rust-rdma-${{ hashFiles('seaweedfs-source/enterprise/rust/Cargo.lock') }}
          restore-keys: |
            rust-rdma-

      # Explicitly compile the RDMA-gated volume server (staged write, commit,
      # and the volume-to-volume RDMA replicator) so a compile error surfaces
      # here rather than buried in the e2e test build below.
      - name: Build volume server (RDMA)
        run: |
          cd seaweedfs-source/enterprise/rust
          cargo build -p seaweedfs-volume-server --features rdma

      # The shipped weed-volume (enterprise/seaweed-volume) now carries the native
      # RDMA read path behind the same `rdma` feature / PrepareRdmaRead wire
      # contract. The release builds it with --features rdma, so compile it here
      # to surface breakage in the shipped server's RDMA path.
      - name: Build shipped volume server (seaweed-volume, RDMA)
        run: |
          cd seaweedfs-source/enterprise/seaweed-volume
          cargo build --features rdma

      # Build every sw-rdma-vfs/tests/rdma_*_e2e.rs present on the dispatched mono
      # branch (read, staged write, replication, volume move, ...), so adding a
      # test on a branch needs no workflow change and main stays green.
      - name: Build RDMA e2e tests (real-rdma)
        run: |
          cd seaweedfs-source/enterprise/rust
          TESTS=""
          for f in sw-rdma-vfs/tests/rdma_*_e2e.rs; do
            [ -e "$f" ] || continue
            TESTS="$TESTS --test $(basename "$f" .rs)"
          done
          if [ -z "$TESTS" ]; then echo "::error::no sw-rdma-vfs/tests/rdma_*_e2e.rs to build"; exit 1; fi
          echo "building e2e tests:$TESTS"
          cargo test -p seaweedfs-sw-rdma-vfs --features real-rdma $TESTS --no-run

      - name: Run RDMA e2e over software RDMA (sudo)
        env:
          RUST_BACKTRACE: 1
        run: |
          set -uxo pipefail
          cd seaweedfs-source/enterprise/rust
          rc=0
          ran=0
          for f in sw-rdma-vfs/tests/rdma_*_e2e.rs; do
            [ -e "$f" ] || continue
            t=$(basename "$f" .rs)
            BIN=$(ls -t target/debug/deps/${t}-* 2>/dev/null | grep -v '\.d$' | head -n1 || true)
            if [ -z "$BIN" ]; then echo "::error::test binary for $t not found"; exit 1; fi
            echo "== running $t :: $BIN =="
            ran=$((ran + 1))
            # Verbs/rdma_cm need root; raise memlock so reg_mr can pin MRs.
            if ! sudo -E env "RXE_IP=$RXE_IP" "RUST_BACKTRACE=$RUST_BACKTRACE" \
              bash -c "ulimit -l unlimited && '$BIN' --nocapture --test-threads=1"; then
              echo "::error::$t failed"; rc=1
            fi
          done
          if [ "$ran" -eq 0 ]; then echo "::error::no rdma_*_e2e tests discovered/run"; exit 1; fi
          exit $rc

      - name: Test summary
        if: always()
        run: |
          {
            echo "## RDMA software (siw) e2e summary"
            echo "- Layer: Soft-iWARP (siw) on a private dummy netdev (RXE_IP)"
            echo "- Tests: all sw-rdma-vfs/tests/rdma_*_e2e.rs (dynamically discovered)"
            echo "- Build: cargo test -p seaweedfs-sw-rdma-vfs --features real-rdma"
          } >> "$GITHUB_STEP_SUMMARY"
