name: "seaweed-vfs: build + publish release packages"

# Builds the SeaweedFS kernel VFS distribution from seaweed-mono and publishes
# the deb/rpm packages as assets on this repo's GitHub Release:
#   * seaweedfs-vfs-dkms  (GPL kernel module source, noarch) -- built once
#   * seaweedfs-vfs       (closed sw-kd daemon)              -- per arch (amd64, arm64)
#   * seaweedfs-vfs-kmod  (precompiled .ko per exact kernel) -- fleets / hardened hosts
# The .ko is NOT shipped in the daemon package; DKMS rebuilds it per kernel on the box.
# Package version comes from the nfpm specs in seaweed-mono (keep them in sync
# with SEAWEEDVFS_VERSION); the Release tag is independent.
#
# For IMMUTABLE hosts (no package manager on the node) it also publishes container
# images to ghcr.io (see RELEASE.md, "Immutable hosts"):
#   * node-image      DaemonSet node-agent, generic (loads the module from the
#                     host's /lib/modules), multi-arch
#   * kmod -> image   the same image with a vermagic-matching seaweedvfs.ko BAKED in
#                     (:<ver>-k<kver>), for non-SecureBoot Talos / Flatcar etc.
#   * talos-extension a signed Talos system extension OCI artifact (the host-native,
#                     SecureBoot-capable path; see the talos-extension job).

on:
  push:
    tags:
      - 'vfs-*'           # e.g. tag this repo vfs-0.5.0
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to publish assets to'
        required: true
        default: 'vfs-latest'
      mono_ref:
        description: 'seaweed-mono ref to build from'
        required: false
        default: 'main'

permissions:
  contents: read

env:
  MONO_REF: ${{ github.event.inputs.mono_ref || 'main' }}
  TAG: ${{ github.event.inputs.tag_name || github.ref_name }}
  IMAGE: ghcr.io/seaweedfs/seaweedfs-vfs

jobs:
  daemon:
    name: "daemon package (${{ matrix.asset }})"
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            deb_arch: amd64
            asset: linux_amd64
          - target: aarch64-unknown-linux-gnu
            deb_arch: arm64
            asset: linux_arm64
            cross: true
    steps:
      - name: Checkout artifactory repo
        uses: actions/checkout@v6

      - name: Clone seaweed-mono source
        env:
          MONO_TOKEN: ${{ secrets.MONO_TOKEN }}
        run: |
          REF="${MONO_REF}"
          printf '%s' "$REF" | grep -Eq '^[A-Za-z0-9._/-]+$' || { echo "bad ref: $REF" >&2; exit 1; }
          git clone -b "$REF" "https://x-access-token:${MONO_TOKEN}@github.com/seaweedfs/seaweed-mono.git" src

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cross-compile tools (arm64)
        if: matrix.cross
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/seaweed-vfs/target
          key: vfs-${{ matrix.target }}-${{ hashFiles('src/seaweed-vfs/Cargo.lock') }}
          restore-keys: vfs-${{ matrix.target }}-

      - name: Build sw-kd daemon
        working-directory: src/seaweed-vfs
        run: cargo build --release --locked -p sw-kd --target ${{ matrix.target }}

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build deb + rpm
        working-directory: src/seaweed-vfs
        run: |
          mkdir -p target/release "$GITHUB_WORKSPACE/dist"
          cp "target/${{ matrix.target }}/release/sw-kd" target/release/sw-kd
          # nfpm reads arch from the spec; patch it for this matrix arch and
          # verify the substitution actually took (don't ship wrong-arch metadata).
          sed -i "s/^arch: .*/arch: ${{ matrix.deb_arch }}/" packaging/nfpm/seaweedfs-vfs.yaml
          grep -q "^arch: ${{ matrix.deb_arch }}$" packaging/nfpm/seaweedfs-vfs.yaml \
            || { echo "failed to set arch in nfpm spec" >&2; exit 1; }
          cd packaging/nfpm
          nfpm pkg -f seaweedfs-vfs.yaml -p deb -t "$GITHUB_WORKSPACE/dist/"
          nfpm pkg -f seaweedfs-vfs.yaml -p rpm -t "$GITHUB_WORKSPACE/dist/"
          ls -l "$GITHUB_WORKSPACE/dist/"

      - name: Checksums
        run: cd dist && for f in *.deb *.rpm; do md5sum "$f" > "$f.md5"; done

      - name: Publish to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dkms:
    name: "dkms source package"
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout artifactory repo
        uses: actions/checkout@v6

      - name: Clone seaweed-mono source
        env:
          MONO_TOKEN: ${{ secrets.MONO_TOKEN }}
        run: |
          REF="${MONO_REF}"
          printf '%s' "$REF" | grep -Eq '^[A-Za-z0-9._/-]+$' || { echo "bad ref: $REF" >&2; exit 1; }
          git clone -b "$REF" "https://x-access-token:${MONO_TOKEN}@github.com/seaweedfs/seaweed-mono.git" src

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build dkms package (deb + rpm, noarch)
        working-directory: src/seaweed-vfs/packaging/nfpm
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          nfpm pkg -f seaweedfs-vfs-dkms.yaml -p deb -t "$GITHUB_WORKSPACE/dist/"
          nfpm pkg -f seaweedfs-vfs-dkms.yaml -p rpm -t "$GITHUB_WORKSPACE/dist/"
          ls -l "$GITHUB_WORKSPACE/dist/"

      - name: Checksums
        run: cd dist && for f in *.deb *.rpm; do md5sum "$f" > "$f.md5"; done

      - name: Publish to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  kmod:
    # Precompiled seaweedvfs.ko per EXACT kernel, for fleets / hardened hosts that
    # can't run DKMS. A .ko only loads on the kernel whose headers it was built
    # against (vermagic must match), so the matrix entries below are examples —
    # add a container with your golden-image kernel's headers for real fleet use.
    # (rhel10 is best-effort: RHEL backports may diverge from upstream 6.12.
    # fail-fast is off so one distro can't block the others.) Signing is applied
    # only when the MODULE_SIGN_KEY / MODULE_SIGN_CERT secrets are set.
    name: "precompiled .ko (${{ matrix.label }})"
    permissions:
      contents: write
      packages: write     # also bake the .ko into a node image + push to ghcr
    runs-on: ubuntu-22.04
    # Entries flagged `optional` (best-effort distros like rhel10) don't fail the
    # run; the golden-image / debian entry stays required.
    continue-on-error: ${{ matrix.optional || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: debian-trixie
            image: debian:trixie
            arch: amd64
            install: apt-get update && apt-get install -y build-essential kmod linux-headers-amd64
            kdir_glob: /usr/src/linux-headers-*-amd64
          # Debian "cloud" kernel flavour — what most cloud VMs (AWS/GCP/Azure
          # Debian images) actually run, distinct from the generic -amd64 above.
          - label: debian-trixie-cloud
            image: debian:trixie
            arch: amd64
            install: apt-get update && apt-get install -y build-essential kmod linux-headers-cloud-amd64
            kdir_glob: /usr/src/linux-headers-*-cloud-amd64
          - label: rhel10
            image: almalinux:10
            arch: amd64
            install: dnf install -y gcc make kmod kernel-devel
            kdir_glob: /usr/src/kernels/*
            optional: true   # RHEL backports may diverge from upstream 6.12
    steps:
      - name: Checkout artifactory repo
        uses: actions/checkout@v6

      - name: Clone seaweed-mono source
        env:
          MONO_TOKEN: ${{ secrets.MONO_TOKEN }}
        run: |
          REF="${MONO_REF}"
          printf '%s' "$REF" | grep -Eq '^[A-Za-z0-9._/-]+$' || { echo "bad ref: $REF" >&2; exit 1; }
          git clone -b "$REF" "https://x-access-token:${MONO_TOKEN}@github.com/seaweedfs/seaweed-mono.git" src

      - name: Stage module-signing material (no-op if secrets unset)
        env:
          KEY: ${{ secrets.MODULE_SIGN_KEY }}
          CERT_B64: ${{ secrets.MODULE_SIGN_CERT }}
        run: |
          printf '%s' "$KEY" > sign_key.pem
          printf '%s' "$CERT_B64" | base64 -d > sign_cert.der 2>/dev/null || : > sign_cert.der

      - name: Build (+ optionally sign) seaweedvfs.ko in ${{ matrix.image }}
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/work -w /work/src/seaweed-vfs ${{ matrix.image }} \
            bash -euxc '
              ${{ matrix.install }}
              KDIR=$(ls -d ${{ matrix.kdir_glob }} | grep -vi common | sort -V | tail -1)
              test -d "$KDIR"
              make -C kernel KDIR="$KDIR"
              if [ -s /work/sign_key.pem ] && [ -s /work/sign_cert.der ]; then
                "$KDIR/scripts/sign-file" sha256 /work/sign_key.pem /work/sign_cert.der kernel/seaweedvfs.ko
                echo "module signed"
              fi
              cat "$KDIR/include/config/kernel.release" > /work/KVER.txt
              cp kernel/seaweedvfs.ko /work/seaweedvfs.ko
            '
          echo "KVER=$(cat KVER.txt)" >> "$GITHUB_ENV"
          echo "Built for kernel: $(cat KVER.txt)"

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Package seaweedfs-vfs-kmod
        working-directory: src/seaweed-vfs/packaging/nfpm
        env:
          KVER: ${{ env.KVER }}
          KMOD_ARCH: ${{ matrix.arch }}
          KO_PATH: ${{ github.workspace }}/seaweedvfs.ko
        run: |
          KMOD_VERSION=$(sed -n 's/.*SEAWEEDVFS_VERSION "\(.*\)".*/\1/p' ../../kernel/seaweedvfs.c | head -1)
          [ -n "$KMOD_VERSION" ] || { echo "could not derive SEAWEEDVFS_VERSION from seaweedvfs.c" >&2; exit 1; }
          export KMOD_VERSION
          # nfpm expands {{ .Env.VAR }} natively — pass vars in the environment.
          mkdir -p "$GITHUB_WORKSPACE/dist"
          nfpm pkg -f seaweedfs-vfs-kmod.yaml -p deb -t "$GITHUB_WORKSPACE/dist/"
          nfpm pkg -f seaweedfs-vfs-kmod.yaml -p rpm -t "$GITHUB_WORKSPACE/dist/"
          ls -l "$GITHUB_WORKSPACE/dist/"

      - name: Checksums
        run: cd dist && for f in *.deb *.rpm; do md5sum "$f" > "$f.md5"; done

      - name: Publish to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Immutable-host variant: bake this exact-kernel .ko into a node image ---
      # Clusters whose nodes have no package manager (non-SecureBoot Talos, Flatcar,
      # ...) can't apt/dnf-install the module. Instead bake the just-built (and, if
      # the signing secrets are set, signed) .ko into the node-agent image:
      # entrypoint.sh insmods /opt/seaweedvfs/seaweedvfs.ko when modprobe finds
      # nothing on the host. The .ko still loads into the *host* kernel, so its
      # vermagic must match the node — hence the per-kernel :<ver>-k<kver> tag.
      # (Builds the image from the Dockerfile, so it recompiles sw-kd; kept
      # independent of the node-image job on purpose — no cross-job race.)
      - name: Log in to ghcr.io
        if: ${{ hashFiles('seaweedvfs.ko') != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Bake + push node image (:<ver>-k<kver>)
        if: ${{ hashFiles('seaweedvfs.ko') != '' }}
        run: |
          VERSION="${TAG#vfs-}"                       # vfs-0.5.0 -> 0.5.0
          cp "$GITHUB_WORKSPACE/seaweedvfs.ko" \
             src/seaweed-vfs/packaging/k8s/baked/seaweedvfs.ko
          docker build -f src/seaweed-vfs/packaging/k8s/Dockerfile \
            -t "${IMAGE}:${VERSION}-k${KVER}" src/seaweed-vfs
          docker push "${IMAGE}:${VERSION}-k${KVER}"
          echo "Pushed ${IMAGE}:${VERSION}-k${KVER} (kernel ${KVER})"

  node-image:
    # Generic node-agent image for the DaemonSet (packaging/k8s/daemonset.yaml).
    # No .ko baked in: it loads the module from the host's /lib/modules (DKMS or
    # the seaweedfs-vfs-kmod package on the node). This is the image the daemonset
    # references by default; the kmod job publishes per-kernel :<ver>-k<kver>
    # variants on top for hosts that can't install the module themselves.
    name: "node-agent image (generic, multi-arch)"
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-22.04
    steps:
      - name: Clone seaweed-mono source
        env:
          MONO_TOKEN: ${{ secrets.MONO_TOKEN }}
        run: |
          REF="${MONO_REF}"
          printf '%s' "$REF" | grep -Eq '^[A-Za-z0-9._/-]+$' || { echo "bad ref: $REF" >&2; exit 1; }
          git clone -b "$REF" "https://x-access-token:${MONO_TOKEN}@github.com/seaweedfs/seaweed-mono.git" src

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image version
        run: echo "VERSION=${TAG#vfs-}" >> "$GITHUB_ENV"   # vfs-0.5.0 -> 0.5.0

      - name: Build + push generic node image
        uses: docker/build-push-action@v6
        with:
          context: src/seaweed-vfs
          file: src/seaweed-vfs/packaging/k8s/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:${{ env.VERSION }}

  talos-extension:
    # Host-native, SecureBoot-capable path for Talos Linux (what Cozystack runs).
    #
    # A Talos host has no package manager and no kernel headers, so neither DKMS
    # nor a deb/rpm works, and on a SecureBoot host the kernel rejects any module
    # not signed by a trusted key — a privileged DaemonSet insmod cannot bypass
    # that. The only robust delivery is a Talos *system extension*: a .ko compiled
    # against the EXACT Talos kernel and signed with that kernel's own key, baked
    # into the boot image.
    #
    # That signing key lives only inside siderolabs' `kernel-build` stage, so this
    # job does NOT compile standalone — it overlays our extension package onto a
    # checkout of siderolabs' build harness and drives it with `bldr`, exactly like
    # the upstream drbd/zfs extensions. See seaweed-vfs/packaging/talos/README.md
    # for the model and the consumption path (Image Factory schematic / imager).
    #
    # Disabled until the prerequisites are set (a seaweedvfs-pkg in a siderolabs/pkgs
    # fork + the PKGS pin for your target Talos release); flip `if:` to enable.
    name: "talos system extension"
    if: ${{ vars.TALOS_EXTENSION_ENABLED == 'true' }}
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-22.04
    env:
      # Pin to the pkgs tag for your target Talos release — see
      # https://github.com/siderolabs/talos/blob/<talos ver>/pkg/machinery/gendata/data/pkgs
      PKGS: ${{ vars.TALOS_PKGS }}
      PKGS_PREFIX: ${{ vars.TALOS_PKGS_PREFIX || 'ghcr.io/seaweedfs' }}
      USERNAME: seaweedfs
      PUSH: "true"
    steps:
      - name: Clone seaweed-mono source (extension package files)
        env:
          MONO_TOKEN: ${{ secrets.MONO_TOKEN }}
        run: |
          REF="${MONO_REF}"
          printf '%s' "$REF" | grep -Eq '^[A-Za-z0-9._/-]+$' || { echo "bad ref: $REF" >&2; exit 1; }
          git clone -b "$REF" "https://x-access-token:${MONO_TOKEN}@github.com/seaweedfs/seaweed-mono.git" src

      - name: Check out siderolabs/extensions build harness
        run: git clone --depth 1 https://github.com/siderolabs/extensions.git ext

      - name: Overlay the seaweedvfs extension
        run: |
          mkdir -p ext/storage/seaweedvfs
          cp src/seaweed-vfs/packaging/talos/pkg.yaml          ext/storage/seaweedvfs/pkg.yaml
          cp src/seaweed-vfs/packaging/talos/manifest.yaml.tmpl ext/storage/seaweedvfs/manifest.yaml.tmpl
          cp src/seaweed-vfs/packaging/talos/vars.yaml          ext/storage/seaweedvfs/vars.yaml

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push extension (bldr)
        working-directory: ext
        run: |
          : "${PKGS:?set the TALOS_PKGS repo variable to your Talos release's pkgs tag}"
          make seaweedvfs PKGS="$PKGS" PKGS_PREFIX="$PKGS_PREFIX" \
            USERNAME="$USERNAME" PUSH="$PUSH" REGISTRY=ghcr.io

      # Tier 1 (no boot, no KVM): pull the just-built extension and inspect the
      # .ko. bldr already runs extensions-validator (layout/manifest) and the
      # signature grep inside the build; this adds the vermagic check and fails
      # hard if the module came out unsigned (Secure Boot would reject it). The
      # image ref + digest come from the bldr metadata file (ARTIFACTS=_out).
      - name: Static checks — vermagic + signature
        working-directory: ext
        run: |
          ref=$(jq -r '."image.name"' _out/seaweedvfs.metadata.json | cut -d, -f1)
          echo "extension image: $ref"
          go install github.com/google/go-containerregistry/cmd/crane@latest
          "$(go env GOPATH)/bin/crane" export "$ref" - \
            | tar -xO --wildcards '*/seaweedvfs.ko' > seaweedvfs.ko
          modinfo seaweedvfs.ko | grep -E '^(name|vermagic|sig_id|signer):'
          modinfo seaweedvfs.ko | grep -q '^sig_id:' \
            || { echo "::error::extension .ko is unsigned — Secure Boot would reject it"; exit 1; }

      - name: Sign the extension image (cosign, keyless)
        if: ${{ vars.COSIGN_ENABLED == 'true' }}
        run: |
          echo "cosign sign ghcr.io/${USERNAME}/seaweedvfs:<tag> — wire to your key/OIDC"
