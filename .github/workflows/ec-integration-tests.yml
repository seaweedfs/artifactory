name: "EC Integration Tests (GitLab)"

on:
  # Triggered by GitLab webhook
  repository_dispatch:
    types: 
      - gitlab-push
      - gitlab-merge-request
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      gitlab_branch:
        description: 'GitLab branch to test'
        required: false
        default: 'enterprise'

concurrency:
  group: ${{ github.head_ref || github.run_id }}/ec-integration
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ec-integration-tests:
    name: EC Integration Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
    - name: Checkout artifactory repo
      uses: actions/checkout@v6

    - name: Clone private GitLab repository
      env:
        GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      run: |
        # Determine branch from webhook or manual input
        if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
          BRANCH_REF="${{ github.event.client_payload.ref }}"
          # Handle null/empty ref by defaulting to enterprise
          if [ "$BRANCH_REF" = "null" ] || [ -z "$BRANCH_REF" ]; then
            BRANCH="enterprise"
          else
            BRANCH=$(echo "$BRANCH_REF" | sed 's|refs/heads/||')
          fi
        else
          BRANCH="${{ github.event.inputs.gitlab_branch }}"
          if [ -z "$BRANCH" ]; then
            BRANCH="enterprise"
          fi
        fi
        
        echo "Cloning branch: $BRANCH"
        git clone -b $BRANCH https://gitlab-ci-token:${GITLAB_TOKEN}@gitlab.com/chrislusf/seaweedfs.git seaweedfs-source
        
        cd seaweedfs-source
        echo "Cloned commit: $(git rev-parse HEAD)"
        echo "COMMIT_SHA=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV
        echo "BRANCH_NAME=$BRANCH" >> $GITHUB_ENV

    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version-file: 'seaweedfs-source/go.mod'
        cache-dependency-path: 'seaweedfs-source/go.sum'
      id: go

    - name: Build weed binary
      working-directory: seaweedfs-source/weed
      run: |
        echo "Building SeaweedFS weed binary for EC tests..."
        go build -o weed .
        
        # Verify binary
        echo "Verifying built binary..."
        ./weed version
        ls -lh weed
        
        # Make binary available in PATH for tests
        echo "$(pwd)" >> $GITHUB_PATH

    - name: Run EC Integration Tests
      working-directory: seaweedfs-source/test/erasure_coding
      run: |
        echo "Running EC Integration Tests..."
        echo "Test directory contents:"
        ls -la
        
        # Run the integration tests with verbose output
        go test -v -timeout 30m

    - name: Run EC Disk-Aware Tests
      if: success() || failure()
      working-directory: seaweedfs-source/test/erasure_coding
      run: |
        echo "Running EC Disk-Aware Rebalancing Tests..."
        go test -v -run TestDiskAwareECRebalancing -timeout 30m || true

    - name: Run EC Disk Type Tests
      if: success() || failure()
      working-directory: seaweedfs-source/test/erasure_coding
      run: |
        echo "Running EC Disk Type Support Tests..."
        go test -v -run TestECDiskTypeSupport -timeout 30m || true

    - name: Run EC Cross-Rack Placement Tests
      if: success() || failure()
      working-directory: seaweedfs-source/test/erasure_coding
      run: |
        echo "Running EC Cross-Rack Placement Tests..."
        go test -v -run TestCrossRackECPlacement -timeout 30m || true

    - name: Archive test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ec-integration-test-logs-${{ env.COMMIT_SHA }}
        path: |
          seaweedfs-source/test/erasure_coding/*.log
          /tmp/seaweedfs_ec_*/*.log
        if-no-files-found: ignore
        retention-days: 7

    - name: EC Integration Test Summary
      if: always()
      run: |
        echo "## 🔧 EC Integration Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### GitLab Source" >> $GITHUB_STEP_SUMMARY
        echo "- **Repository**: https://gitlab.com/chrislusf/seaweedfs" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ env.COMMIT_SHA }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: ${{ env.BRANCH_NAME }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Tests Executed" >> $GITHUB_STEP_SUMMARY
        echo "- 🧪 **EC Encoding/Decoding**: Volume location timing bug fix verification" >> $GITHUB_STEP_SUMMARY
        echo "- 🔄 **Master Timing Race Condition**: Race condition simulation and fix verification" >> $GITHUB_STEP_SUMMARY
        echo "- 📊 **Shard Distribution**: Multi-server EC shard distribution tests" >> $GITHUB_STEP_SUMMARY
        echo "- 🧹 **Cleanup Verification**: Post-encoding cleanup validation" >> $GITHUB_STEP_SUMMARY
        echo "- 💿 **Disk-Aware EC Rebalancing**: Multi-disk shard placement tests" >> $GITHUB_STEP_SUMMARY
        echo "- 📁 **Disk Type Support**: SSD/HDD disk type filtering tests" >> $GITHUB_STEP_SUMMARY
        echo "- 🏢 **Cross-Rack Placement**: Rack-aware EC shard distribution" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Test Features Covered" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **EC 10+4 Encoding**: Standard erasure coding with 10 data + 4 parity shards" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Customizable EC Ratios**: Enterprise feature for custom data/parity ratios (see ec-custom-ratio-tests job)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Volume Location Collection**: Pre-encoding location caching" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Multi-Disk Support**: Distribution across multiple disks per server" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Disk Type Filtering**: SSD/HDD-aware EC placement" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Rack-Aware Placement**: Cross-rack fault tolerance" >> $GITHUB_STEP_SUMMARY

  # End-to-end test for custom EC ratio support (Enterprise feature)
  # Regression test for https://github.com/seaweedfs/seaweedfs/issues/8936
  ec-custom-ratio-tests:
    name: EC Custom Ratio Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
    - name: Checkout artifactory repo
      uses: actions/checkout@v6

    - name: Clone private GitLab repository
      env:
        GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      run: |
        # Determine branch from webhook or manual input
        if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
          BRANCH_REF="${{ github.event.client_payload.ref }}"
          if [ "$BRANCH_REF" = "null" ] || [ -z "$BRANCH_REF" ]; then
            BRANCH="enterprise"
          else
            BRANCH=$(echo "$BRANCH_REF" | sed 's|refs/heads/||')
          fi
        else
          BRANCH="${{ github.event.inputs.gitlab_branch }}"
          if [ -z "$BRANCH" ]; then
            BRANCH="enterprise"
          fi
        fi

        echo "Cloning branch: $BRANCH"
        git clone -b $BRANCH https://gitlab-ci-token:${GITLAB_TOKEN}@gitlab.com/chrislusf/seaweedfs.git seaweedfs-source

        cd seaweedfs-source
        echo "Cloned commit: $(git rev-parse HEAD)"
        echo "COMMIT_SHA=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV

    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version-file: 'seaweedfs-source/go.mod'
        cache-dependency-path: 'seaweedfs-source/go.sum'
      id: go

    - name: Build weed binary
      working-directory: seaweedfs-source
      run: |
        echo "Building SeaweedFS weed binary for custom EC ratio tests..."
        go build -o weed_bin ./weed
        ./weed_bin version
        ls -lh weed_bin

    - name: Test Custom EC Ratio Config Propagation
      working-directory: seaweedfs-source/test/erasure_coding/custom_ratio_test
      run: |
        echo "Running EC custom ratio config propagation test..."
        go test -v -run TestCustomECRatioConfigPropagation -timeout 15m

    - name: Test Custom EC Ratio End-to-End (4+2)
      if: success() || failure()
      working-directory: seaweedfs-source/test/erasure_coding/custom_ratio_test
      run: |
        echo "Running EC custom ratio 4+2 end-to-end test..."
        echo "This test verifies that configuring a 4+2 EC ratio via the admin API"
        echo "produces exactly 6 EC shards (not the default 14 from 10+4)."
        go test -v -run TestCustomECRatioEndToEnd -timeout 15m

    - name: Test Multiple EC Ratios
      if: success() || failure()
      working-directory: seaweedfs-source/test/erasure_coding/custom_ratio_test
      run: |
        echo "Running multiple EC ratio tests (4+2, 6+3, 8+4)..."
        go test -v -run TestMultipleECRatios -timeout 30m

    - name: Test 2+1 on 3 Disks (Issue #9146)
      if: success() || failure()
      working-directory: seaweedfs-source/test/erasure_coding/custom_ratio_test
      run: |
        echo "Running 2+1 ratio on 3-disk cluster — direct regression for issue #9146."
        echo "Pre-fix this timed out because detection required 4 disks for a 3-shard ratio."
        go test -v -run TestCustomECRatio2Plus1On3Disks -timeout 15m

    - name: Test Admin Restart Preserves Custom Ratio
      if: success() || failure()
      working-directory: seaweedfs-source/test/erasure_coding/custom_ratio_test
      run: |
        echo "Running admin-restart persistence test — exercises the TaskPolicy proto fields."
        echo "Pre-fix: the admin forgot custom ratios after restart because the proto dropped them."
        go test -v -run TestCustomECRatioAdminRestartPersistsRatio -timeout 15m

    - name: Test Invalid Ratio Override Is Rejected
      if: success() || failure()
      working-directory: seaweedfs-source/test/erasure_coding/custom_ratio_test
      run: |
        echo "Running partial-override rejection test — exercises atomic EffectiveRatio validation."
        echo "Pre-fix: data_shards alone became <that>+default-parity, a mixed ratio the admin never asked for."
        go test -v -run TestCustomECRatioRejectsInvalidOverride -timeout 15m

    - name: Archive test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ec-custom-ratio-test-logs-${{ env.COMMIT_SHA }}
        path: |
          seaweedfs-source/test/erasure_coding/custom_ratio_test/tmp/logs/*.log
        if-no-files-found: ignore
        retention-days: 7

    - name: EC Custom Ratio Test Summary
      if: always()
      run: |
        echo "## EC Custom Ratio Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Regression tests for [#8936](https://github.com/seaweedfs/seaweedfs/issues/8936) and [#9146](https://github.com/seaweedfs/seaweedfs/issues/9146)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Tests" >> $GITHUB_STEP_SUMMARY
        echo "- **Config Propagation**: Verifies admin API accepts and persists custom data_shards/parity_shards" >> $GITHUB_STEP_SUMMARY
        echo "- **End-to-End 4+2**: Configures 4+2 ratio, uploads data, verifies 6 shards created (not 14)" >> $GITHUB_STEP_SUMMARY
        echo "- **Multiple Ratios**: Tests 4+2, 6+3, 8+4 ratios with data integrity verification" >> $GITHUB_STEP_SUMMARY
        echo "- **2+1 on 3 disks** (#9146): Regression for the small-cluster edge — ratio plans, encodes, and reads back on exactly 3 volume servers" >> $GITHUB_STEP_SUMMARY
        echo "- **Admin restart persistence**: Verifies the TaskPolicy proto round-trips data_shards/parity_shards across admin restart" >> $GITHUB_STEP_SUMMARY
        echo "- **Invalid ratio override**: Verifies partial (data_shards alone) and oversize (31+31) overrides fall back to default 10+4 instead of becoming silent mixed ratios" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### What This Catches" >> $GITHUB_STEP_SUMMARY
        echo "- Custom EC ratio not propagated from admin config to detection/execution" >> $GITHUB_STEP_SUMMARY
        echo "- Detection code hardcoding default 10+4 instead of reading configured ratio" >> $GITHUB_STEP_SUMMARY
        echo "- Min-disk floor rejecting valid small-cluster ratios (issue #9146)" >> $GITHUB_STEP_SUMMARY
        echo "- TaskPolicy proto dropping ratio fields on admin restart" >> $GITHUB_STEP_SUMMARY
        echo "- Partial/oversize ratio overrides silently mutating into mixed ratios" >> $GITHUB_STEP_SUMMARY
        echo "- Data corruption or read failures after custom-ratio EC encoding" >> $GITHUB_STEP_SUMMARY

  # Regression test job
  ec-regression-tests:
    name: EC Regression Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
    - name: Checkout artifactory repo
      uses: actions/checkout@v6

    - name: Clone private GitLab repository
      env:
        GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      run: |
        # Determine branch from webhook or manual input
        if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
          BRANCH_REF="${{ github.event.client_payload.ref }}"
          # Handle null/empty ref by defaulting to enterprise
          if [ "$BRANCH_REF" = "null" ] || [ -z "$BRANCH_REF" ]; then
            BRANCH="enterprise"
          else
            BRANCH=$(echo "$BRANCH_REF" | sed 's|refs/heads/||')
          fi
        else
          BRANCH="${{ github.event.inputs.gitlab_branch }}"
          if [ -z "$BRANCH" ]; then
            BRANCH="enterprise"
          fi
        fi
        
        echo "Cloning branch: $BRANCH"
        git clone -b $BRANCH https://gitlab-ci-token:${GITLAB_TOKEN}@gitlab.com/chrislusf/seaweedfs.git seaweedfs-source
        
        cd seaweedfs-source
        echo "COMMIT_SHA=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV

    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version-file: 'seaweedfs-source/go.mod'
        cache-dependency-path: 'seaweedfs-source/go.sum'
      id: go

    - name: Run EC Regression Tests
      working-directory: seaweedfs-source/test/erasure_coding
      run: |
        echo "Running EC Regression Prevention Tests..."
        go test -v -run TestECEncodingRegressionPrevention -timeout 10m

    - name: Run EC Unit Tests
      working-directory: seaweedfs-source/weed
      run: |
        echo "Running EC-related unit tests..."
        go test -v ./storage/erasure_coding/... -timeout 10m || true
        go test -v ./shell/... -run ".*[Ee][Cc].*" -timeout 10m || true

    - name: EC Regression Test Summary
      if: always()
      run: |
        echo "## 🔒 EC Regression Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Regression Prevention" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Function Signature Checks**: Verify fixed function signatures haven't reverted" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Timing Pattern Checks**: Verify correct volume location collection order" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Error Handling**: Verify proper error returns (not silent nil)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Known Bug Fixes Verified" >> $GITHUB_STEP_SUMMARY
        echo "- 🐛 **Double Storage Bug**: Volume locations collected BEFORE EC encoding" >> $GITHUB_STEP_SUMMARY
        echo "- 🐛 **Silent Failure Bug**: Functions return proper errors" >> $GITHUB_STEP_SUMMARY
        echo "- 🐛 **Cleanup Race Condition**: Pre-collected locations used for cleanup" >> $GITHUB_STEP_SUMMARY

