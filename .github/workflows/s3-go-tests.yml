          if [ "$BRANCH" = "null" ]; then
            BRANCH="main"
          fi

          if ! printf '%s' "$BRANCH" | grep -Eq '^[A-Za-z0-9._/-]+$'; then echo "Refusing invalid branch: $BRANCH" >&2; exit 1; fi

          echo "Cloning branch: $BRANCH"
          git clone -b "$BRANCH" https://x-access-token:${MONO_TOKEN}@github.com/seaweedfs/seaweed-mono.git seaweedfs-source

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'seaweedfs-source/enterprise/go.mod'
          cache-dependency-path: 'seaweedfs-source/enterprise/go.sum'
        id: go

      - name: Install SeaweedFS
        working-directory: seaweedfs-source/enterprise/weed
        run: |
          go install -buildvcs=false

      - name: Run S3 Versioning Stress Tests
        timeout-minutes: 30
        working-directory: seaweedfs-source/enterprise/test/s3/versioning
        run: |
          set -x
          echo "=== System Information ==="
          uname -a
          free -h

          # Start server for stress tests
          make start-server

          # Run stress tests (concurrent operations)
          make test-versioning-stress || {
            echo "❌ Stress test failed, checking logs..."
            if [ -f weed-test.log ]; then
              echo "=== Server logs ==="
              tail -200 weed-test.log
            fi
            make stop-server
            make clean
            exit 1
          }

          # Run pagination stress tests (>1000 versions)
          echo "=== Running pagination stress tests ==="
          make test-versioning-pagination-stress || {
            echo "❌ Pagination stress test failed, checking logs..."
            if [ -f weed-test.log ]; then
              echo "=== Server logs ==="
              tail -200 weed-test.log
            fi
            make stop-server
            make clean
            exit 1
          }

          make stop-server
          make clean

      - name: Upload stress test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s3-versioning-stress-logs
          path: seaweedfs-source/enterprise/test/s3/versioning/weed-test*.log
          retention-days: 7

