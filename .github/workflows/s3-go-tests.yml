  s3-test-summary:
    name: S3 Test Summary
    runs-on: ubuntu-22.04
    needs:
      - s3-versioning-tests
      - s3-versioning-compatibility
      - s3-cors-compatibility
      - s3-retention-tests
      - s3-lifecycle-tests
      - s3-checksum-tests
      - s3-cors-tests
      - s3-retention-worm
      - s3-versioning-stress
      - s3-tagging-tests
      - s3-remote-cache-tests
    if: always()
    steps:
      - name: Generate Test Summary
        env:
          PAYLOAD_REF: ${{ github.event.client_payload.ref }}
          INPUT_BRANCH: ${{ github.event.inputs.gitlab_branch }}
        run: |
          echo "## 🧪 S3 Go Tests Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### seaweed-mono Source" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: https://github.com/seaweedfs/seaweed-mono" >> $GITHUB_STEP_SUMMARY
          BRANCH="${PAYLOAD_REF:-$INPUT_BRANCH}"; BRANCH="${BRANCH:-main}"; BRANCH="${BRANCH#refs/heads/}"
          echo "- **Branch**: $BRANCH" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Versioning**: ${{ needs.s3-versioning-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Versioning Compatibility**: ${{ needs.s3-versioning-compatibility.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 CORS Compatibility**: ${{ needs.s3-cors-compatibility.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Retention**: ${{ needs.s3-retention-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Lifecycle**: ${{ needs.s3-lifecycle-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Checksum**: ${{ needs.s3-checksum-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 CORS**: ${{ needs.s3-cors-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 WORM**: ${{ needs.s3-retention-worm.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Versioning Stress**: ${{ needs.s3-versioning-stress.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Tagging**: ${{ needs.s3-tagging-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Remote Cache**: ${{ needs.s3-remote-cache-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count successful tests
          SUCCESS_COUNT=0
          [ "${{ needs.s3-versioning-tests.result }}" = "success" ] && SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          [ "${{ needs.s3-versioning-compatibility.result }}" = "success" ] && SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          [ "${{ needs.s3-cors-compatibility.result }}" = "success" ] && SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          [ "${{ needs.s3-retention-tests.result }}" = "success" ] && SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          [ "${{ needs.s3-lifecycle-tests.result }}" = "success" ] && SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          [ "${{ needs.s3-checksum-tests.result }}" = "success" ] && SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          [ "${{ needs.s3-cors-tests.result }}" = "success" ] && SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          [ "${{ needs.s3-retention-worm.result }}" = "success" ] && SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          [ "${{ needs.s3-versioning-stress.result }}" = "success" ] && SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          [ "${{ needs.s3-tagging-tests.result }}" = "success" ] && SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          [ "${{ needs.s3-remote-cache-tests.result }}" = "success" ] && SUCCESS_COUNT=$((SUCCESS_COUNT + 1))

          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ **$SUCCESS_COUNT/11** test suites passed" >> $GITHUB_STEP_SUMMARY

          if [ $SUCCESS_COUNT -eq 11 ]; then
            echo "🎉 **All S3 tests passed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some tests failed. Check individual job logs for details.**" >> $GITHUB_STEP_SUMMARY
          fi
