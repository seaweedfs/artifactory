          go install -buildvcs=false

      - name: Run ${{ matrix.test }}
        timeout-minutes: 8
        working-directory: seaweedfs-source/enterprise/test/s3/lifecycle
        run: |
          set -x
          make test-with-server TEST_PATTERN='^${{ matrix.test }}$$'

      - name: Show server logs on failure
        if: failure()
        working-directory: seaweedfs-source/enterprise/test/s3/lifecycle
