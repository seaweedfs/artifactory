name: "S3 Go Tests (seaweed-mono)"
run-name: ${{ github.workflow }}${{ github.event.client_payload.sha && format(' · mono:{0}', github.event.client_payload.sha) || '' }}

on:
  # Triggered by seaweed-mono push (repository_dispatch)
  repository_dispatch:
    types:
      - mono-push
      - mono-merge-request

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      gitlab_branch:
        description: 'seaweed-mono branch to test'
        required: false
        default: 'main'

concurrency:
  # head_ref is empty for repository_dispatch/workflow_dispatch, so key on the
  # dispatched mono ref (or the manual branch input) to actually dedupe runs.
  group: ${{ github.event.client_payload.ref || github.event.inputs.gitlab_branch || 'main' }}/s3-go-tests
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  s3-versioning-tests:
    name: S3 Versioning Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    strategy:
      matrix:
        test-type: ["quick", "comprehensive"]

    steps:
      - name: Checkout artifactory repo
        uses: actions/checkout@v6

      - name: Clone seaweed-mono (enterprise) source
        env:
          MONO_TOKEN: ${{ secrets.MONO_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PAYLOAD_REF: ${{ github.event.client_payload.ref }}
          INPUT_BRANCH: ${{ github.event.inputs.gitlab_branch }}
        run: |
          # Determine branch from webhook or manual input
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            BRANCH="$PAYLOAD_REF"
          else
            BRANCH="$INPUT_BRANCH"
          fi
          [ -n "$BRANCH" ] && [ "$BRANCH" != "null" ] || BRANCH="main"
          BRANCH=$(echo "$BRANCH" | sed 's|refs/heads/||')
          if [ "$BRANCH" = "null" ]; then
            BRANCH="main"
          fi

          if ! printf '%s' "$BRANCH" | grep -Eq '^[A-Za-z0-9._/-]+$'; then echo "Refusing invalid branch: $BRANCH" >&2; exit 1; fi

          echo "Cloning branch: $BRANCH"
          git clone -b "$BRANCH" https://x-access-token:${MONO_TOKEN}@github.com/seaweedfs/seaweed-mono.git seaweedfs-source

          cd seaweedfs-source
          echo "Cloned commit: $(git rev-parse HEAD)"
          echo "COMMIT_SHA=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'seaweedfs-source/enterprise/go.mod'
          cache-dependency-path: 'seaweedfs-source/enterprise/go.sum'
        id: go

      - name: Build SeaweedFS
        working-directory: seaweedfs-source/enterprise/weed
        run: |
          go build -buildvcs=false -o weed .
          echo "SeaweedFS binary built at: $GITHUB_WORKSPACE/seaweedfs-source/enterprise/weed/weed"
          ./weed version

      - name: Start SeaweedFS Components
        timeout-minutes: 10
        run: |
          set -x
          # Create clean data directory for this test run
          export WEED_DATA_DIR="/tmp/seaweedfs-s3versioning-$(date +%s)"
          export WEED_BINARY="$GITHUB_WORKSPACE/seaweedfs-source/enterprise/weed/weed"

          echo "Starting SeaweedFS components for S3 versioning tests..."
          echo "Data directory: $WEED_DATA_DIR"
          echo "Weed binary: $WEED_BINARY"

          # Make startup script executable and run it
          chmod +x $GITHUB_WORKSPACE/.github/scripts/start-seaweedfs-components.sh
          $GITHUB_WORKSPACE/.github/scripts/start-seaweedfs-components.sh \
            --data-dir "$WEED_DATA_DIR" \
            --binary "$WEED_BINARY" \
            --verbose 1 \
            --master-port 9333 \
            --volume-port 8080 \
            --filer-port 8888 \
            --volume-max 100 \
            --volume-size-limit 100 \
            --filer-max-mb 64 &

          # Store environment variables for later steps
          echo "WEED_DATA_DIR=$WEED_DATA_DIR" >> $GITHUB_ENV
          echo "WEED_BINARY=$WEED_BINARY" >> $GITHUB_ENV

          # Wait for startup script to complete component initialization
          wait

          echo "All SeaweedFS components started successfully!"

      - name: Run S3 Versioning Tests - ${{ matrix.test-type }}
        timeout-minutes: 25
        working-directory: seaweedfs-source/enterprise/test/s3/versioning
        run: |
          set -x
          echo "=== System Information ==="
          uname -a
          free -h
          df -h
          echo "=== Starting Tests ==="

          # Set the weed binary path for tests
          export PATH="$(dirname $WEED_BINARY):$PATH"

          # Run tests with automatic server management
          # The test-with-server target handles server startup/shutdown automatically
          if [ "${{ matrix.test-type }}" = "quick" ]; then
            # Override TEST_PATTERN for quick tests only
            make test-with-server TEST_PATTERN="TestBucketListReturnDataVersioning|TestVersioningBasicWorkflow|TestVersioningDeleteMarkers"
          else
            # Run all versioning tests
            make test-with-server
          fi

      - name: Show server logs on failure
        if: failure()
        working-directory: seaweedfs-source/enterprise/test/s3/versioning
        run: |
          echo "=== Server Logs ==="
          if [ -f weed-test.log ]; then
            echo "Last 100 lines of server logs:"
            tail -100 weed-test.log
          else
            echo "No server log file found"
          fi

          echo "=== Test Environment ==="
          ps aux | grep -E "(weed|test)" || true
          netstat -tlnp | grep -E "(8333|9333|8080)" || true

      - name: Cleanup SeaweedFS Components
        if: always()
        run: |
          echo "Stopping SeaweedFS components..."
          if [ -n "$WEED_DATA_DIR" ] && [ -d "$WEED_DATA_DIR" ]; then
            $GITHUB_WORKSPACE/.github/scripts/start-seaweedfs-components.sh --stop --data-dir "$WEED_DATA_DIR" || true
            # Clean up data directory
            rm -rf "$WEED_DATA_DIR" || true
          fi

          # Additional cleanup - kill any remaining weed processes
          pkill -f "weed.*master\|weed.*volume\|weed.*filer" 2>/dev/null || true

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: s3-versioning-test-logs-${{ matrix.test-type }}-${{ env.COMMIT_SHA }}
          path: seaweedfs-source/enterprise/test/s3/versioning/weed-test*.log
          retention-days: 3

