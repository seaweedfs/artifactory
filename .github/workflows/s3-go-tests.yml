          echo "Cloning branch: $BRANCH"
          git clone -b "$BRANCH" https://x-access-token:${MONO_TOKEN}@github.com/seaweedfs/seaweed-mono.git seaweedfs-source

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'seaweedfs-source/enterprise/go.mod'
          cache-dependency-path: 'seaweedfs-source/enterprise/go.sum'
        id: go

      - name: Install SeaweedFS
        working-directory: seaweedfs-source/enterprise/weed
        run: |
          go install -buildvcs=false

      - name: Run Core Versioning Test (Python s3tests equivalent)
        timeout-minutes: 15
        working-directory: seaweedfs-source/enterprise/test/s3/versioning
        run: |
          set -x
          echo "=== System Information ==="
          uname -a
          free -h

          # Run the specific test that is equivalent to the Python s3tests
          make test-with-server || {
            echo "❌ Test failed, checking logs..."
            if [ -f weed-test.log ]; then
              echo "=== Server logs ==="
              tail -100 weed-test.log
            fi
            echo "=== Process information ==="
            ps aux | grep -E "(weed|test)" || true
            exit 1
          }

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: s3-versioning-compatibility-logs
          path: seaweedfs-source/enterprise/test/s3/versioning/weed-test*.log
          retention-days: 3

  s3-cors-compatibility:
    name: S3 CORS Compatibility Test
