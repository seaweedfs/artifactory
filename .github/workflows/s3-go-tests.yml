  s3-retention-worm:
    name: S3 Retention WORM Integration Test
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout artifactory repo
        uses: actions/checkout@v6

      - name: Clone seaweed-mono (enterprise) source
        env:
          MONO_TOKEN: ${{ secrets.MONO_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PAYLOAD_REF: ${{ github.event.client_payload.ref }}
          INPUT_BRANCH: ${{ github.event.inputs.gitlab_branch }}
        run: |
          # Determine branch from webhook or manual input
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            BRANCH="$PAYLOAD_REF"
          else
            BRANCH="$INPUT_BRANCH"
          fi
          [ -n "$BRANCH" ] && [ "$BRANCH" != "null" ] || BRANCH="main"
          BRANCH=$(echo "$BRANCH" | sed 's|refs/heads/||')
          if [ "$BRANCH" = "null" ]; then
            BRANCH="main"
          fi

          if ! printf '%s' "$BRANCH" | grep -Eq '^[A-Za-z0-9._/-]+$'; then echo "Refusing invalid branch: $BRANCH" >&2; exit 1; fi

          echo "Cloning branch: $BRANCH"
          git clone -b "$BRANCH" https://x-access-token:${MONO_TOKEN}@github.com/seaweedfs/seaweed-mono.git seaweedfs-source

          cd seaweedfs-source
          echo "Cloned commit: $(git rev-parse HEAD)"
          echo "COMMIT_SHA=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'seaweedfs-source/enterprise/go.mod'
          cache-dependency-path: 'seaweedfs-source/enterprise/go.sum'
        id: go

      - name: Install SeaweedFS
        working-directory: seaweedfs-source/enterprise/weed
        run: |
          go install -buildvcs=false

      - name: Run WORM Integration Tests
        timeout-minutes: 15
        working-directory: seaweedfs-source/enterprise/test/s3/retention
        run: |
          set -x
          echo "=== System Information ==="
          uname -a
          free -h

          # Run the WORM integration tests with automatic server management
          # The test-with-server target handles server startup/shutdown automatically
          make test-with-server TEST_PATTERN="TestWORM|TestRetentionExtendedAttributes|TestRetentionConcurrentOperations" || {
            echo "❌ WORM integration test failed, checking logs..."
            if [ -f weed-test.log ]; then
              echo "=== Server logs ==="
              tail -100 weed-test.log
            fi
            echo "=== Process information ==="
            ps aux | grep -E "(weed|test)" || true
            exit 1
          }

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: s3-retention-worm-logs-${{ env.COMMIT_SHA }}
          path: seaweedfs-source/enterprise/test/s3/retention/weed-test*.log
          retention-days: 3

