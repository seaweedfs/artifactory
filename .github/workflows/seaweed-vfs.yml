name: "seaweed-vfs (seaweed-mono)"
run-name: ${{ github.workflow }}${{ github.event.client_payload.sha && format(' · mono:{0}', github.event.client_payload.sha) || '' }}

on:
  # Triggered by seaweed-mono push (repository_dispatch)
  repository_dispatch:
    types:
      # vfs-scoped events: the seaweed-mono dispatcher sends these only when
      # seaweed-vfs/** changed, so enterprise-only changes no longer trigger this.
      - mono-vfs-push
      - mono-vfs-merge-request

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      gitlab_branch:
        description: 'seaweed-mono branch to test'
        required: false
        default: 'main'

  # Nightly against main — catches distro kernel bumps that break the shipped
  # module source even when nothing in seaweed-mono changed (the reported issue:
  # a 7.0 point release moved a VFS API under unchanged 0.1.2 source). On a
  # schedule trigger the clone step falls back to the main branch.
  schedule:
    - cron: '0 4 * * *'

concurrency:
  # head_ref is empty for repository_dispatch/workflow_dispatch, so key on the
  # dispatched mono ref (or the manual branch input) to actually dedupe runs.
  group: ${{ github.event.client_payload.ref || github.event.inputs.gitlab_branch || 'main' }}/seaweed-vfs
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Build the Rust workspace (sw-client, sw-fuse, sw-kd) and run unit tests.
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout artifactory repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false   # don't leave a token in .git/config (bind-mounted into containers)

      - name: Link to seaweed-mono source
        if: github.event_name == 'repository_dispatch'
        uses: ./.github/actions/mono-source-link

      - name: Clone seaweed-mono source
        uses: ./.github/actions/clone-mono-source
        with:
          token: ${{ secrets.MONO_TOKEN }}
          branch: ${{ github.event.inputs.gitlab_branch }}

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libfuse3-dev pkg-config
      - name: Build
        working-directory: seaweedfs-source/seaweed-vfs
        run: cargo build --workspace --locked
      - name: Test
        working-directory: seaweedfs-source/seaweed-vfs
        run: cargo test --workspace --locked

  # Compile the kernel module against pinned Debian trixie (6.12) headers,
  # matching the deployment/dev kernel. (ubuntu-latest's own kernel headers
  # drift across VFS API changes, e.g. the 6.13 i_op->mkdir signature.)
  kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout artifactory repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false   # don't leave a token in .git/config (bind-mounted into containers)

      - name: Clone seaweed-mono source
        uses: ./.github/actions/clone-mono-source
        with:
          token: ${{ secrets.MONO_TOKEN }}
          branch: ${{ github.event.inputs.gitlab_branch }}

      - name: Build seaweedvfs.ko in debian:trixie
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/work -w /work/seaweedfs-source/seaweed-vfs debian:trixie \
            bash -euxc '
              apt-get update
              apt-get install -y build-essential linux-headers-amd64
              KDIR=$(ls -d /usr/src/linux-headers-*-amd64 | grep -vi common | sort -V | tail -1)
              echo "Building against $KDIR"
              test -d "$KDIR"
              make -C kernel KDIR="$KDIR"
              ls -l kernel/seaweedvfs.ko
            '

  # Regression guard for the reported issue: the *packaged* DKMS source (what
  # `apt/dnf install seaweedfs-vfs-dkms` drops in /usr/src and DKMS builds against
  # the running kernel) failed to compile on a newer kernel after a VFS API change.
  # The `kernel` job above only builds the in-tree source against one kernel
  # (trixie 6.12), so it missed it. Here we build the real package and compile its
  # source against a span of kernels — crucially 7.0 (sid) and rawhide, NEWER than
  # the deploy kernel — and assert the package version is internally consistent.
  dkms-package:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # rawhide is a non-blocking canary; the fixed-kernel entries are required.
    continue-on-error: ${{ matrix.optional || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "6.12 · Debian trixie"
            image: debian:trixie
            pkg: deb
            install: apt-get update && apt-get install -y build-essential linux-headers-amd64
            kdir_glob: /usr/src/linux-headers-*-amd64
          - label: "7.0 · Debian sid"
            image: debian:sid
            pkg: deb
            install: apt-get update && apt-get install -y build-essential linux-headers-amd64
            kdir_glob: /usr/src/linux-headers-*-amd64
          - label: "newest · Fedora rawhide"
            image: fedora:rawhide
            pkg: rpm
            install: dnf install -y gcc make kernel-devel cpio rpm
            kdir_glob: /usr/src/kernels/*
            optional: true
    steps:
      - name: Checkout artifactory repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false   # don't leave a token in .git/config (bind-mounted into containers)

      - name: Clone seaweed-mono source
        uses: ./.github/actions/clone-mono-source
        with:
          token: ${{ secrets.MONO_TOKEN }}
          branch: ${{ github.event.inputs.gitlab_branch }}

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.47.0   # pinned for reproducibility (match the release path)
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build the seaweedfs-vfs-dkms package
        working-directory: seaweedfs-source/seaweed-vfs/packaging/nfpm
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          nfpm pkg -f seaweedfs-vfs-dkms.yaml -p ${{ matrix.pkg }} -t "$GITHUB_WORKSPACE/dist/"
          ls -l "$GITHUB_WORKSPACE/dist/"

      - name: Check package version consistency
        working-directory: seaweedfs-source/seaweed-vfs
        run: bash tests/check_pkg_versions.sh

      - name: Build packaged source against ${{ matrix.label }}
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/work -w /work ${{ matrix.image }} \
            bash -euxc '
              ${{ matrix.install }}
              KDIR=$(ls -d ${{ matrix.kdir_glob }} | grep -vi common | sort -V | tail -1)
              test -d "$KDIR"
              PKG=$(ls /work/dist/seaweedfs-vfs-dkms*.${{ matrix.pkg }} | sort -V | tail -1)
              bash /work/seaweedfs-source/seaweed-vfs/tests/dkms_pkg_build.sh "$PKG" "$KDIR"
            '

  # End-to-end FUSE smoke test against a real single-node SeaweedFS cluster.
  fuse-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout artifactory repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false   # don't leave a token in .git/config (bind-mounted into containers)

      - name: Clone seaweed-mono source
        uses: ./.github/actions/clone-mono-source
        with:
          token: ${{ secrets.MONO_TOKEN }}
          branch: ${{ github.event.inputs.gitlab_branch }}

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler fuse3 libfuse3-dev pkg-config curl attr
      - name: Install weed
        run: |
          # A freshly-published release uploads its ~50 assets one at a time, so
          # releases/latest/download/linux_amd64.tar.gz can 404 for a few minutes
          # after the tag goes live. Retry until the asset is available, and
          # download to a file first so a 404 body never gets piped into tar.
          for i in $(seq 1 20); do
            curl -fsSL https://github.com/seaweedfs/seaweedfs/releases/latest/download/linux_amd64.tar.gz \
              -o "$RUNNER_TEMP/weed.tar.gz" && break
            echo "weed download attempt $i failed (release asset not ready?); retrying in 15s..."
            sleep 15
          done
          sudo tar -xzf "$RUNNER_TEMP/weed.tar.gz" -C /usr/local/bin weed
          weed version
      - name: Start SeaweedFS (master+volume+filer)
        run: |
          mkdir -p "$RUNNER_TEMP/sw"
          weed server -dir="$RUNNER_TEMP/sw" -filer -ip=127.0.0.1 \
            -master.volumeSizeLimitMB=128 > "$RUNNER_TEMP/weed.log" 2>&1 &
          echo "waiting for filer..."
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8888/ >/dev/null 2>&1 && break
            sleep 1
          done
          curl -sf http://127.0.0.1:8888/ >/dev/null
      - name: Build sw-fuse
        working-directory: seaweedfs-source/seaweed-vfs
        run: cargo build -p sw-fuse --locked
      - name: Mount + read/write smoke test
        working-directory: seaweedfs-source/seaweed-vfs
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/mnt"
          # weed server carries no enterprise license, so disable the gate for the test mount.
          SEAWEED_DISABLE_ENTERPRISE_MODE=1 RUST_LOG=info ./target/debug/sw-fuse "$RUNNER_TEMP/mnt" --filer 127.0.0.1:18888 \
            > "$RUNNER_TEMP/swvfs.log" 2>&1 &
          SW=$!
          sleep 3
          mount | grep -q "seaweedfs on $RUNNER_TEMP/mnt"
          # small file round-trip
          echo "hello-from-ci" > "$RUNNER_TEMP/mnt/ci.txt"
          test "$(cat "$RUNNER_TEMP/mnt/ci.txt")" = "hello-from-ci"
          # multi-chunk file round-trip
          head -c 6000000 /dev/urandom > "$RUNNER_TEMP/big.bin"
          cp "$RUNNER_TEMP/big.bin" "$RUNNER_TEMP/mnt/big.bin"
          cmp "$RUNNER_TEMP/big.bin" "$RUNNER_TEMP/mnt/big.bin"
          # directory ops
          mkdir "$RUNNER_TEMP/mnt/d"; echo x > "$RUNNER_TEMP/mnt/d/y"; ls -la "$RUNNER_TEMP/mnt/d"
          rm "$RUNNER_TEMP/mnt/d/y"; rmdir "$RUNNER_TEMP/mnt/d"
          # POSIX conformance (ops sw-fuse lacks are auto-skipped, not failed)
          bash tests/posix_itest.sh "$RUNNER_TEMP/mnt"
          fusermount3 -u "$RUNNER_TEMP/mnt"
          wait $SW 2>/dev/null || true
          echo "smoke test OK"
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== weed.log ==="; tail -100 "$RUNNER_TEMP/weed.log" 2>/dev/null || true
          echo "=== swvfs.log ==="; tail -100 "$RUNNER_TEMP/swvfs.log" 2>/dev/null || true

  # Full pjdfstest POSIX compliance suite against an sw-fuse mount — the VFS
  # analogue of the Go mount's enterprise/test/pjdfstest. The harness starts a
  # weed mini cluster, mounts sw-fuse, builds pjdfstest, and runs it under prove;
  # ops sw-fuse does not implement yet are listed in
  # seaweed-vfs/tests/pjdfstest/known_failures.txt and skipped.
  pjdfstest:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout artifactory repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false   # don't leave a token in .git/config (bind-mounted into containers)

      - name: Clone seaweed-mono source
        uses: ./.github/actions/clone-mono-source
        with:
          token: ${{ secrets.MONO_TOKEN }}
          branch: ${{ github.event.inputs.gitlab_branch }}

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler fuse3 libfuse3-dev pkg-config curl attr autoconf build-essential

      - name: Install weed
        run: |
          # A freshly-published release uploads its ~50 assets one at a time, so
          # releases/latest/download/linux_amd64.tar.gz can 404 for a few minutes
          # after the tag goes live. Retry until the asset is available, and
          # download to a file first so a 404 body never gets piped into tar.
          for i in $(seq 1 20); do
            curl -fsSL https://github.com/seaweedfs/seaweedfs/releases/latest/download/linux_amd64.tar.gz \
              -o "$RUNNER_TEMP/weed.tar.gz" && break
            echo "weed download attempt $i failed (release asset not ready?); retrying in 15s..."
            sleep 15
          done
          sudo tar -xzf "$RUNNER_TEMP/weed.tar.gz" -C /usr/local/bin weed
          weed version

      - name: Enable FUSE allow_other
        run: echo 'user_allow_other' | sudo tee -a /etc/fuse.conf

      - name: Build sw-fuse
        working-directory: seaweedfs-source/seaweed-vfs
        run: cargo build --release -p sw-fuse --locked

      - name: Run pjdfstest
        working-directory: seaweedfs-source/seaweed-vfs
        run: bash tests/pjdfstest/run.sh

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== pjdfstest logs ==="
          tail -200 /tmp/sw-vfs-pjdfstest-logs/*.log 2>/dev/null || true
