    - name: Build and start SeaweedFS MQ
      working-directory: seaweedfs-source/enterprise
      run: |
        set -e
        go build -o /usr/local/bin/weed ./weed
        export WEED_DATA_DIR=/tmp/seaweedfs-smq-$RANDOM
        mkdir -p "$WEED_DATA_DIR"

        nohup weed -v 1 server \
          -ip="127.0.0.1" \
          -ip.bind="0.0.0.0" \
          -dir="$WEED_DATA_DIR" \
          -master.raftHashicorp \
          -master.port=9333 \
          -volume.port=8081 \
          -filer.port=8888 \
          -filer=true \
          -metricsPort=9325 \
          -master.peers=none \
          > /tmp/weed-server.log 2>&1 &

        for i in $(seq 1 30); do
          if curl -s http://127.0.0.1:9333/cluster/status >/dev/null; then break; fi
          sleep 1
        done

        for i in $(seq 1 30); do
          if nc -z 127.0.0.1 19333 2>/dev/null; then break; fi
          sleep 1
        done

        sleep 15

        # Additional wait specifically for gRPC services to be ready for streaming
        echo "Allowing extra time for master gRPC streaming services to initialize..."
        sleep 10

        nohup weed -v 3 mq.broker \
          -master="127.0.0.1:9333" \
          -ip="127.0.0.1" \
          -port=17777 \
          -logFlushInterval=0 \
          > /tmp/weed-mq-broker.log 2>&1 &

        sleep 15
        broker_ready=false
        for i in $(seq 1 20); do
          if nc -z 127.0.0.1 17777 2>/dev/null; then broker_ready=true; break; fi
          sleep 1
        done

        if [ "$broker_ready" = true ]; then
          sleep 30
        else
          echo "ERROR: MQ broker failed to start. Broker logs:"
          cat /tmp/weed-mq-broker.log || true
          tail -20 /tmp/weed-server.log || true
          exit 1
        fi

    - name: Run SMQ Integration Tests
      working-directory: seaweedfs-source/enterprise/test/kafka
      run: |
        ulimit -n 512 || echo "Warning: Could not set file descriptor limit"
        ulimit -u 100 || echo "Warning: Could not set process limit"
        # Run the dedicated SMQ integration tests
        go test -v -run "^TestSMQIntegration" -timeout 180s ./integration/...
      env:
        GOMAXPROCS: 1
        SEAWEEDFS_MASTERS: 127.0.0.1:9333

    - name: Upload test logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: kafka-smq-integration-logs-${{ env.COMMIT_SHA }}
        path: |
          /tmp/weed-server.log
          /tmp/weed-mq-broker.log
        retention-days: 3

  kafka-protocol-tests:
    name: Kafka Protocol Tests (Isolated)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        container-id: [protocol-1]
    env:
      GOMAXPROCS: 1
      CGO_ENABLED: 0
      KAFKA_PROTOCOL_ISOLATION: "true"
      CONTAINER_ID: ${{ matrix.container-id }}
    steps:
    - name: Checkout artifactory repo
      uses: actions/checkout@v6

    - name: Clone seaweed-mono (enterprise) source
      env:
        MONO_TOKEN: ${{ secrets.MONO_TOKEN }}
        EVENT_NAME: ${{ github.event_name }}
        PAYLOAD_REF: ${{ github.event.client_payload.ref }}
        INPUT_BRANCH: ${{ github.event.inputs.gitlab_branch }}
      run: |
        if [ "$EVENT_NAME" = "repository_dispatch" ]; then BRANCH="$PAYLOAD_REF"; else BRANCH="$INPUT_BRANCH"; fi
        [ -n "$BRANCH" ] && [ "$BRANCH" != "null" ] || BRANCH="main"
        BRANCH=$(echo "$BRANCH" | sed 's|refs/heads/||')
        if [ "$BRANCH" = "null" ]; then
          BRANCH="main"
        fi
        if ! printf '%s' "$BRANCH" | grep -Eq '^[A-Za-z0-9._/-]+$'; then echo "Refusing invalid branch: $BRANCH" >&2; exit 1; fi
        echo "Cloning branch: $BRANCH"
        git clone -b "$BRANCH" https://x-access-token:${MONO_TOKEN}@github.com/seaweedfs/seaweed-mono.git seaweedfs-source
        cd seaweedfs-source
        echo "Cloned commit: $(git rev-parse HEAD)"
        echo "COMMIT_SHA=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV

    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version-file: 'seaweedfs-source/enterprise/go.mod'
        cache: true
        cache-dependency-path: seaweedfs-source/enterprise/**/go.sum
      id: go

    - name: Get dependencies
      working-directory: seaweedfs-source/enterprise/test/kafka
      run: |
        go mod download
        go mod tidy

    - name: Run Protocol Tests
      working-directory: seaweedfs-source/enterprise/weed/mq/kafka
      run: |
        export TMPDIR=/tmp
        # Run protocol tests from the weed/mq/kafka directory since they test the protocol implementation
        go test -v -run "^Test.*" -timeout 10s ./...
      env:
        GOMAXPROCS: 1
        TMPDIR: /tmp
