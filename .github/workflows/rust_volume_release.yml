name: "rust: build enterprise volume server binaries"

# Mirrors the OSS rust_binaries_release.yml in seaweedfs/seaweedfs, but builds
# the Rust weed-volume from the private enterprise source (same as release.yml
# does for the Go weed binary) and publishes enterprise-marked assets + .md5.

on:
  push:
    tags:
      - '*'
      - '!vfs-*'   # vfs-<version> tags publish via seaweed-vfs-release.yml
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release'
        required: true
        default: 'latest'

permissions:
  contents: read

jobs:

  build-rust-volume-enterprise-linux:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_suffix: linux_amd64
          - target: aarch64-unknown-linux-gnu
            asset_suffix: linux_arm64
            cross: true

    steps:
      - name: Checkout artifactory repo
        uses: actions/checkout@v6

      - name: Clone seaweed-mono (enterprise) source
        env:
          MONO_TOKEN: ${{ secrets.MONO_TOKEN }}
        run: |
          git clone -b main https://x-access-token:${MONO_TOKEN}@github.com/seaweedfs/seaweed-mono.git seaweedfs-enterprise-source
          cd seaweedfs-enterprise-source
          echo "Cloned enterprise branch commit: $(git rev-parse HEAD)"
          echo "COMMIT_SHA=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_ENV"

      - name: Install build dependencies
        # protobuf for tonic-build; clang/libclang for rdma-sys bindgen;
        # ibverbs/rdmacm dev headers so the volume server links the rdma feature.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler clang libclang-dev libibverbs-dev librdmacm-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev:arm64 libibverbs-dev:arm64 librdmacm-dev:arm64
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "OPENSSL_DIR=/usr" >> "$GITHUB_ENV"
          echo "OPENSSL_INCLUDE_DIR=/usr/include" >> "$GITHUB_ENV"
          echo "OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu" >> "$GITHUB_ENV"
          # rdma-sys runs bindgen; target arm64 so struct layouts match the .so.
          echo "BINDGEN_EXTRA_CLANG_ARGS=--target=aarch64-linux-gnu" >> "$GITHUB_ENV"

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            seaweedfs-enterprise-source/enterprise/seaweed-volume/target
          key: rust-enterprise-${{ matrix.target }}-${{ hashFiles('seaweedfs-enterprise-source/enterprise/seaweed-volume/Cargo.lock') }}
          restore-keys: |
            rust-enterprise-${{ matrix.target }}-

      # Non-RDMA assets: no libibverbs linkage, run on any host. Default download.
      - name: Build Rust volume server (large disk)
        env:
          SEAWEEDFS_COMMIT: ${{ env.COMMIT_SHA }}
        run: |
          cd seaweedfs-enterprise-source/enterprise/seaweed-volume
          cargo build --release --target ${{ matrix.target }} --target-dir target/large-disk

      - name: Build Rust volume server (normal)
        env:
          SEAWEEDFS_COMMIT: ${{ env.COMMIT_SHA }}
        run: |
          cd seaweedfs-enterprise-source/enterprise/seaweed-volume
          cargo build --release --target ${{ matrix.target }} --no-default-features --target-dir target/normal

      # RDMA assets: --features rdma links libibverbs/librdmacm, so these REQUIRE
      # rdma-core at runtime even when RDMA is disabled. Published as separate
      # -rdma binaries for RDMA-capable hosts.
      - name: Build Rust volume server (large disk, RDMA)
        env:
          SEAWEEDFS_COMMIT: ${{ env.COMMIT_SHA }}
        run: |
          cd seaweedfs-enterprise-source/enterprise/seaweed-volume
          cargo build --release --target ${{ matrix.target }} --features rdma --target-dir target/large-disk-rdma

      - name: Build Rust volume server (normal, RDMA)
        env:
          SEAWEEDFS_COMMIT: ${{ env.COMMIT_SHA }}
        run: |
          cd seaweedfs-enterprise-source/enterprise/seaweed-volume
          cargo build --release --target ${{ matrix.target }} --no-default-features --features rdma --target-dir target/normal-rdma

      - name: Package binaries
        run: |
          # Each variant builds into its own --target-dir so they don't clobber
          # the shared release path.
          root=seaweedfs-enterprise-source/enterprise/seaweed-volume/target
          pkg() { # <target-dir> <inner-binary-name> <tar-basename>
            cp "$root/$1/${{ matrix.target }}/release/weed-volume" "$2"
            tar czf "$3.tar.gz" "$2"
            rm "$2"
          }
          pkg large-disk      weed-volume-large-disk      weed-volume-enterprise_large_disk_${{ matrix.asset_suffix }}
          pkg normal          weed-volume-normal          weed-volume-enterprise_${{ matrix.asset_suffix }}
          pkg large-disk-rdma weed-volume-large-disk-rdma weed-volume-enterprise-rdma_large_disk_${{ matrix.asset_suffix }}
          pkg normal-rdma     weed-volume-normal-rdma     weed-volume-enterprise-rdma_${{ matrix.asset_suffix }}

      - name: Generate md5 checksums
        run: |
          for f in \
            weed-volume-enterprise_large_disk_${{ matrix.asset_suffix }}.tar.gz \
            weed-volume-enterprise_${{ matrix.asset_suffix }}.tar.gz \
            weed-volume-enterprise-rdma_large_disk_${{ matrix.asset_suffix }}.tar.gz \
            weed-volume-enterprise-rdma_${{ matrix.asset_suffix }}.tar.gz; do
            md5sum "$f" > "$f.md5"
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            weed-volume-enterprise_large_disk_${{ matrix.asset_suffix }}.tar.gz
            weed-volume-enterprise_large_disk_${{ matrix.asset_suffix }}.tar.gz.md5
            weed-volume-enterprise_${{ matrix.asset_suffix }}.tar.gz
            weed-volume-enterprise_${{ matrix.asset_suffix }}.tar.gz.md5
            weed-volume-enterprise-rdma_large_disk_${{ matrix.asset_suffix }}.tar.gz
            weed-volume-enterprise-rdma_large_disk_${{ matrix.asset_suffix }}.tar.gz.md5
            weed-volume-enterprise-rdma_${{ matrix.asset_suffix }}.tar.gz
            weed-volume-enterprise-rdma_${{ matrix.asset_suffix }}.tar.gz.md5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
