name: "Plugin Worker Tests (seaweed-mono)"
run-name: ${{ github.workflow }}${{ github.event.client_payload.sha && format(' · mono:{0}', github.event.client_payload.sha) || '' }}

on:
  repository_dispatch:
    types:
      - mono-push
      - mono-merge-request
  workflow_dispatch:
    inputs:
      gitlab_branch:
        description: 'seaweed-mono branch to test'
        required: false
        default: 'main'

concurrency:
  # head_ref is empty for repository_dispatch/workflow_dispatch, so key on the
  # dispatched mono ref (or the manual branch input) to actually dedupe runs.
  group: ${{ github.event.client_payload.ref || github.event.inputs.gitlab_branch || 'main' }}/plugin-workers
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  plugin-workers:
    name: "Plugin Worker: ${{ matrix.worker }}"
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - worker: erasure_coding
            path: test/plugin_workers/erasure_coding
          - worker: ec_repair
            path: test/plugin_workers/ec_repair
          - worker: ec_vacuum
            path: test/plugin_workers/ec_vacuum
          - worker: vacuum
            path: test/plugin_workers/vacuum
          - worker: volume_balance
            path: test/plugin_workers/volume_balance

    steps:
    - name: Checkout artifactory repo
      uses: actions/checkout@v6

    - name: Clone seaweed-mono (enterprise) source
      env:
        MONO_TOKEN: ${{ secrets.MONO_TOKEN }}
        EVENT_NAME: ${{ github.event_name }}
        PAYLOAD_REF: ${{ github.event.client_payload.ref }}
        INPUT_BRANCH: ${{ github.event.inputs.gitlab_branch }}
      run: |
        if [ "$EVENT_NAME" = "repository_dispatch" ]; then BRANCH="$PAYLOAD_REF"; else BRANCH="$INPUT_BRANCH"; fi
        [ -n "$BRANCH" ] && [ "$BRANCH" != "null" ] || BRANCH="main"
        BRANCH=$(echo "$BRANCH" | sed 's|refs/heads/||')
        if [ "$BRANCH" = "null" ]; then
          BRANCH="main"
        fi
        if ! printf '%s' "$BRANCH" | grep -Eq '^[A-Za-z0-9._/-]+$'; then echo "Refusing invalid branch: $BRANCH" >&2; exit 1; fi
        echo "Cloning branch: $BRANCH"
        git clone -b "$BRANCH" https://x-access-token:${MONO_TOKEN}@github.com/seaweedfs/seaweed-mono.git seaweedfs-source
        cd seaweedfs-source
        echo "Cloned commit: $(git rev-parse HEAD)"
        echo "COMMIT_SHA=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV

    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version-file: 'seaweedfs-source/enterprise/go.mod'
        cache-dependency-path: 'seaweedfs-source/enterprise/go.sum'
      id: go

    - name: Run plugin worker tests
      working-directory: seaweedfs-source/enterprise
      run: |
        go test -v ./${{ matrix.path }}
